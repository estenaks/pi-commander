<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Config</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: dark;

        --bg: #0b0f14;
        --panel: #121826;
        --text: #e8eef7;
        --muted: #a8b3c7;
        --border: rgba(255,255,255,0.14);
        --border2: rgba(255,255,255,0.10);
        --shadow: rgba(0,0,0,0.45);
        --accent: #6aa6ff;

        --input-bg: rgba(255,255,255,0.06);
        --btn-bg: rgba(255,255,255,0.08);
        --btn-bg-hover: rgba(255,255,255,0.12);
        --pre-bg: rgba(255,255,255,0.06);
      }

      /* Optional light mode if you ever want it: add ?theme=light */
      html.theme-light {
        color-scheme: light;

        --bg: #ffffff;
        --panel: #f6f8fb;
        --text: #0f172a;
        --muted: #475569;
        --border: rgba(15,23,42,0.16);
        --border2: rgba(15,23,42,0.10);
        --shadow: rgba(15,23,42,0.10);
        --accent: #2563eb;

        --input-bg: rgba(15,23,42,0.05);
        --btn-bg: rgba(15,23,42,0.08);
        --btn-bg-hover: rgba(15,23,42,0.12);
        --pre-bg: rgba(15,23,42,0.05);
      }

      body {
        font-family: sans-serif;
        padding: 16px;
        max-width: 900px;

        background: var(--bg);
        color: var(--text);
      }

      h1 { margin-top: 0; }

      .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

      input[type="text"] {
        padding: 10px;
        font-size: 16px;
        flex: 1;
        min-width: 240px;

        color: var(--text);
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        outline: none;
      }

      input[type="text"]:focus {
        border-color: color-mix(in srgb, var(--accent) 65%, var(--border));
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent);
      }

      button {
        padding: 10px 14px;
        font-size: 16px;
        cursor: pointer;

        color: var(--text);
        background: var(--btn-bg);
        border: 1px solid var(--border);
        border-radius: 10px;
      }

      button:hover { background: var(--btn-bg-hover); }
      button:active { transform: translateY(1px); }

      fieldset {
        margin-top: 12px;
        padding: 10px 12px;

        border: 1px solid var(--border);
        border-radius: 12px;
        background: color-mix(in srgb, var(--panel) 70%, transparent);
      }

      label { margin-right: 12px; white-space: nowrap; }

      .status { margin-top: 12px; color: var(--muted); }

      img {
        max-width: 520px;
        width: 100%;
        height: auto;
        display: block;
        margin-top: 12px;

        border: 1px solid var(--border2);
        border-radius: 12px;
        box-shadow: 0 10px 30px var(--shadow);
        background: rgba(255,255,255,0.02);
      }

      pre {
        background: var(--pre-bg);
        padding: 12px;
        overflow: auto;

        border: 1px solid var(--border);
        border-radius: 12px;
      }

      .muted { color: var(--muted); font-size: 13px; margin-top: 6px; }
    </style>
  </head>
  <body>
    <h1>/config</h1>

    <div class="row">
      <input id="q" type="text" placeholder='Search card name (fuzzy), e.g. "norin the wary"' />
      <button id="searchBtn">Search</button>
      <button id="randomBtn">Get random commander</button>
    </div>

    <fieldset>
      <legend>Random filters</legend>

      <div style="margin-bottom:8px;">
        <strong>Color identity (exactly):</strong>
      </div>

      <label><input type="checkbox" class="ci" value="w"> White</label>
      <label><input type="checkbox" class="ci" value="u"> Blue</label>
      <label><input type="checkbox" class="ci" value="b"> Black</label>
      <label><input type="checkbox" class="ci" value="r"> Red</label>
      <label><input type="checkbox" class="ci" value="g"> Green</label>

      <div class="muted">
        “Exactly” means the random commander's color identity must be equal to the checked set (e.g. only {R} or exactly {U,B}, etc).
        If nothing is checked, random is any color identity.
      </div>
    </fieldset>

    <div class="status" id="status"></div>
    <img id="preview" alt="preview" />
    <pre id="json"></pre>

    <script>
      // Optional: allow overriding theme with ?theme=light
      (function initTheme() {
        const p = new URLSearchParams(location.search);
        const theme = (p.get("theme") || "").trim().toLowerCase();
        if (theme === "light") document.documentElement.classList.add("theme-light");
      })();

      const DEFAULT_QUERY = "norin the wary";

      const qEl = document.getElementById("q");
      const statusEl = document.getElementById("status");
      const previewEl = document.getElementById("preview");
      const jsonEl = document.getElementById("json");

      function setBusy(msg) {
        statusEl.textContent = msg;
        jsonEl.textContent = "";
        previewEl.removeAttribute("src");
      }

      async function postJson(url, body) {
        const r = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body || {}),
        });
        const data = await r.json().catch(() => ({}));
        return { r, data };
      }

      function selectedColors() {
        return Array.from(document.querySelectorAll("input.ci:checked"))
          .map(cb => cb.value)
          .sort();
      }

      async function doSearch(query) {
        const q = (query || "").trim();
        if (!q) return;

        setBusy(`Searching Scryfall for "${q}"...`);
        const { r, data } = await postJson("/api/search", { q });

        jsonEl.textContent = JSON.stringify(data, null, 2);
        if (!r.ok) { statusEl.textContent = "Error (see JSON below)"; return; }

        statusEl.textContent = `Now showing: ${data.name}`;
        previewEl.src = data.border_crop_url;
      }

      async function doRandomCommander() {
        const colors = selectedColors();
        const label = colors.length ? ` (exact id=${colors.join("")})` : "";
        setBusy(`Getting random commander${label}...`);

        const { r, data } = await postJson("/api/random", { colors, identity_match: "exact", mode: "commander" });

        jsonEl.textContent = JSON.stringify(data, null, 2);
        if (!r.ok) { statusEl.textContent = "Error (see JSON below)"; return; }

        statusEl.textContent = `Now showing (random commander): ${data.name}`;
        previewEl.src = data.border_crop_url;
      }

      document.getElementById("searchBtn").addEventListener("click", () => doSearch(qEl.value));
      document.getElementById("randomBtn").addEventListener("click", () => doRandomCommander());
      qEl.addEventListener("keydown", (e) => { if (e.key === "Enter") doSearch(qEl.value); });

      qEl.value = DEFAULT_QUERY;
      doSearch(DEFAULT_QUERY);
    </script>
  </body>
</html>
