<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booster Pack Simulator - Pi Commander</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #1a1a1a;
            color: #fff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .controls {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        select, button {
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
        }
        select {
            background: #3a3a3a;
            color: #fff;
            min-width: 300px;
        }
        button {
            background: #4CAF50;
            color: white;
            cursor: pointer;
            padding: 12px 20px;
        }
        button:hover {
            background: #45a049;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .random-btn {
            background: #ff6b35;
        }
        .random-btn:hover {
            background: #e85a2b;
        }
        .loading {
            text-align: center;
            padding: 20px;
            font-style: italic;
        }
        .error {
            color: #ff6b6b;
            padding: 10px;
            background: #2a1a1a;
            border-radius: 4px;
            margin: 10px 0;
        }
        .progress {
            margin: 10px 0;
            font-size: 14px;
            color: #ccc;
        }
        .pack-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .card-slot {
            aspect-ratio: 63/88;
            border: 2px solid #444;
            border-radius: 12px;
            overflow: hidden;
            background: #2a2a2a;
            position: relative;
            transition: all 0.3s ease;
        }
        .card-slot.loading {
            background: linear-gradient(45deg, #2a2a2a, #3a3a3a, #2a2a2a);
            background-size: 200% 200%;
            animation: shimmer 1.5s infinite;
        }
        .card-slot.loaded {
            border-color: #4CAF50;
            transform: scale(1.02);
        }
        @keyframes shimmer {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }
        .card-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .card-slot img.loaded {
            opacity: 1;
        }
        .card-rarity {
            position: absolute;
            top: 5px;
            right: 5px;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }
        .rarity-common { background: #8cc8ff; color: #000; }
        .rarity-uncommon { background: #c0c0c0; color: #000; }
        .rarity-rare { background: #ffb366; color: #000; }
        .rarity-mythic { background: #ff6b35; color: #fff; }
        .loading-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 12px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎴 Booster Pack Simulator</h1>
        
        <div class="controls">
            <div>
                <label for="setSelect">Choose a Set:</label>
                <select id="setSelect">
                    <option value="">Loading sets...</option>
                </select>
                <button id="generateBtn" disabled onclick="generatePack()">Generate Pack</button>
                <button id="randomBtn" class="random-btn" onclick="generateRandomPack()">Random Set Pack</button>
            </div>
            <div id="setInfo" style="margin-top: 10px; font-size: 14px; color: #ccc;"></div>
            <div id="progress" class="progress" style="display: none;"></div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            Preparing your booster pack...
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="packGrid" class="pack-grid"></div>
    </div>

    <script>
        let allSets = [];
        let currentGeneration = null;

        // Load sets on page load
        async function loadSets() {
            try {
                const response = await fetch('/api/booster/sets');
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                allSets = data.sets;
                populateSetSelect();
            } catch (error) {
                showError('Failed to load sets: ' + error.message);
            }
        }

        function populateSetSelect() {
            const select = document.getElementById('setSelect');
            select.innerHTML = '<option value="">-- Choose a set --</option>';
            
            // Sort sets by release date (newest first)
            const sortedSets = allSets
                .filter(set => set.card_count > 0)
                .sort((a, b) => new Date(b.released_at) - new Date(a.released_at));

            sortedSets.forEach(set => {
                const option = document.createElement('option');
                option.value = set.code;
                option.textContent = `${set.name} (${set.released_at})`;
                select.appendChild(option);
            });

            select.addEventListener('change', function() {
                const generateBtn = document.getElementById('generateBtn');
                generateBtn.disabled = !this.value;
                
                if (this.value) {
                    const selectedSet = allSets.find(s => s.code === this.value);
                    document.getElementById('setInfo').textContent = 
                        `${selectedSet.card_count} cards • Released: ${selectedSet.released_at}`;
                } else {
                    document.getElementById('setInfo').textContent = '';
                }
            });
        }

        async function generatePack() {
            const setCode = document.getElementById('setSelect').value;
            if (!setCode) return;

            await generatePackForSet(setCode);
        }

        async function generateRandomPack() {
            const eligibleSets = allSets.filter(set => set.card_count > 50);
            const randomSet = eligibleSets[Math.floor(Math.random() * eligibleSets.length)];
            
            // Update UI to show selected set
            document.getElementById('setSelect').value = randomSet.code;
            document.getElementById('setInfo').textContent = 
                `${randomSet.card_count} cards • Released: ${randomSet.released_at}`;
            
            await generatePackForSet(randomSet.code);
        }

        async function generatePackForSet(setCode) {
            // Cancel any ongoing generation
            if (currentGeneration) {
                currentGeneration.cancelled = true;
            }

            // Start new generation
            currentGeneration = { cancelled: false, cardCount: 0 };
            
            showLoading(true);
            hideError();
            setupPackGrid();
            
            try {
                // Start the progressive generation
                await generatePackProgressive(setCode, currentGeneration);
            } catch (error) {
                if (!currentGeneration.cancelled) {
                    showError('Failed to generate pack: ' + error.message);
                }
            } finally {
                showLoading(false);
                if (!currentGeneration.cancelled) {
                    currentGeneration = null;
                }
            }
        }

        function setupPackGrid() {
            const grid = document.getElementById('packGrid');
            grid.innerHTML = '';

            // Create 12 empty card slots
            for (let i = 0; i < 12; i++) {
                const cardSlot = document.createElement('div');
                cardSlot.className = 'card-slot loading';
                cardSlot.id = `card-slot-${i}`;
                
                const loadingText = document.createElement('div');
                loadingText.className = 'loading-text';
                loadingText.textContent = i < 9 ? 'Common' : 'Uncommon';
                cardSlot.appendChild(loadingText);
                
                grid.appendChild(cardSlot);
            }
        }

        async function generatePackProgressive(setCode, generation) {
            updateProgress('Starting pack generation...');
            
            const usedCardIds = new Set(); // Track used cards to prevent duplicates
            
            // Generate commons (9 cards)
            for (let i = 0; i < 9; i++) {
                if (generation.cancelled) return;
                
                updateProgress(`Fetching common ${i + 1}/9...`);
                try {
                    const card = await fetchSingleCard(setCode, 'common', usedCardIds);
                    if (!generation.cancelled && card) {
                        displayCard(card, i);
                        usedCardIds.add(card.id); // Track this card
                        generation.cardCount++;
                    }
                } catch (error) {
                    console.error(`Failed to fetch common ${i + 1}:`, error);
                }
            }

            // Generate uncommons (3 cards)
            for (let i = 0; i < 3; i++) {
                if (generation.cancelled) return;
                
                updateProgress(`Fetching uncommon ${i + 1}/3...`);
                try {
                    const card = await fetchSingleCard(setCode, 'uncommon', usedCardIds);
                    if (!generation.cancelled && card) {
                        displayCard(card, 9 + i);
                        usedCardIds.add(card.id); // Track this card
                        generation.cardCount++;
                    }
                } catch (error) {
                    console.error(`Failed to fetch uncommon ${i + 1}:`, error);
                }
            }

            if (!generation.cancelled) {
                updateProgress(`Pack complete! ${generation.cardCount}/12 cards loaded.`);
                setTimeout(() => {
                    document.getElementById('progress').style.display = 'none';
                }, 2000);
            }
        }

        async function fetchSingleCard(setCode, rarity, usedCardIds = new Set()) {
            const response = await fetch('/api/booster/single', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ 
                    set_code: setCode,
                    rarity: rarity,
                    exclude_ids: Array.from(usedCardIds) // Send list of already used card IDs
                })
            });

            const data = await response.json();
            
            if (data.error) {
                throw new Error(data.error);
            }

            return data.card;
        }

        async function fetchSingleCard(setCode, rarity) {
            const response = await fetch('/api/booster/single', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ 
                    set_code: setCode,
                    rarity: rarity 
                })
            });

            const data = await response.json();
            
            if (data.error) {
                throw new Error(data.error);
            }

            return data.card;
        }

        function displayCard(card, slotIndex) {
            const cardSlot = document.getElementById(`card-slot-${slotIndex}`);
            if (!cardSlot) return;

            // Clear loading state
            cardSlot.innerHTML = '';
            cardSlot.className = 'card-slot';
            
            const img = document.createElement('img');
            img.src = card.image_url;
            img.alt = card.name;
            img.title = `${card.name} - ${card.rarity}`;
            
            const rarityBadge = document.createElement('div');
            rarityBadge.className = `card-rarity rarity-${card.rarity}`;
            rarityBadge.textContent = card.rarity[0].toUpperCase();
            
            cardSlot.appendChild(img);
            cardSlot.appendChild(rarityBadge);

            // Add loaded class with slight delay for animation
            img.onload = () => {
                img.classList.add('loaded');
                cardSlot.classList.add('loaded');
                
                // Remove the loaded highlight after a moment
                setTimeout(() => {
                    cardSlot.classList.remove('loaded');
                }, 1000);
            };
        }

        function updateProgress(message) {
            const progressDiv = document.getElementById('progress');
            progressDiv.textContent = message;
            progressDiv.style.display = 'block';
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('generateBtn').disabled = show;
            document.getElementById('randomBtn').disabled = show;
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        // Load sets when page loads
        loadSets();
    </script>
</body>
</html>
