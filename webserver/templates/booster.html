<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booster Pack Simulator - Pi Commander</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #1a1a1a;
            color: #fff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .controls {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        select, button {
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
        }
        select {
            background: #3a3a3a;
            color: #fff;
            min-width: 300px;
        }
        button {
            background: #4CAF50;
            color: white;
            cursor: pointer;
            padding: 12px 20px;
        }
        button:hover {
            background: #45a049;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .random-btn {
            background: #ff6b35;
        }
        .random-btn:hover {
            background: #e85a2b;
        }
        .loading {
            text-align: center;
            padding: 20px;
            font-style: italic;
        }
        .error {
            color: #ff6b6b;
            padding: 10px;
            background: #2a1a1a;
            border-radius: 4px;
            margin: 10px 0;
        }
        .pack-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-top: 20px;
        }
        .card-slot {
            aspect-ratio: 63/88;
            border: 2px solid #444;
            border-radius: 12px;
            overflow: hidden;
            background: #2a2a2a;
            position: relative;
        }
        .card-slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-rarity {
            position: absolute;
            top: 5px;
            right: 5px;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }
        .rarity-common { background: #8cc8ff; color: #000; }
        .rarity-uncommon { background: #c0c0c0; color: #000; }
        .rarity-rare { background: #ffb366; color: #000; }
        .rarity-mythic { background: #ff6b35; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎴 Booster Pack Simulator</h1>
        
        <div class="controls">
            <div>
                <label for="setSelect">Choose a Set:</label>
                <select id="setSelect">
                    <option value="">Loading sets...</option>
                </select>
                <button id="generateBtn" disabled onclick="generatePack()">Generate Pack</button>
                <button id="randomBtn" class="random-btn" onclick="generateRandomPack()">Random Set Pack</button>
            </div>
            <div id="setInfo" style="margin-top: 10px; font-size: 14px; color: #ccc;"></div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            Generating your booster pack...
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="packGrid" class="pack-grid"></div>
    </div>

    <script>
        let allSets = [];
        let currentDelay = 0;

        // Rate limiting helper
        function addDelay() {
            currentDelay += 75; // 75ms between requests
            return currentDelay;
        }

        function resetDelay() {
            currentDelay = 0;
        }

        // Load sets on page load
        async function loadSets() {
            try {
                const response = await fetch('/api/booster/sets');
                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                allSets = data.sets;
                populateSetSelect();
            } catch (error) {
                showError('Failed to load sets: ' + error.message);
            }
        }

        function populateSetSelect() {
            const select = document.getElementById('setSelect');
            select.innerHTML = '<option value="">-- Choose a set --</option>';
            
            // Sort sets by release date (newest first)
            const sortedSets = allSets
                .filter(set => set.card_count > 0)
                .sort((a, b) => new Date(b.released_at) - new Date(a.released_at));

            sortedSets.forEach(set => {
                const option = document.createElement('option');
                option.value = set.code;
                option.textContent = `${set.name} (${set.released_at})`;
                select.appendChild(option);
            });

            select.addEventListener('change', function() {
                const generateBtn = document.getElementById('generateBtn');
                generateBtn.disabled = !this.value;
                
                if (this.value) {
                    const selectedSet = allSets.find(s => s.code === this.value);
                    document.getElementById('setInfo').textContent = 
                        `${selectedSet.card_count} cards • Released: ${selectedSet.released_at}`;
                } else {
                    document.getElementById('setInfo').textContent = '';
                }
            });
        }

        async function generatePack() {
            const setCode = document.getElementById('setSelect').value;
            if (!setCode) return;

            await generatePackForSet(setCode);
        }

        async function generateRandomPack() {
            const eligibleSets = allSets.filter(set => set.card_count > 50);
            const randomSet = eligibleSets[Math.floor(Math.random() * eligibleSets.length)];
            
            // Update UI to show selected set
            document.getElementById('setSelect').value = randomSet.code;
            document.getElementById('setInfo').textContent = 
                `${randomSet.card_count} cards • Released: ${randomSet.released_at}`;
            
            await generatePackForSet(randomSet.code);
        }

        async function generatePackForSet(setCode) {
            showLoading(true);
            hideError();
            resetDelay();

            try {
                const response = await fetch('/api/booster/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ set_code: setCode })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }

                displayPack(data.cards);
            } catch (error) {
                showError('Failed to generate pack: ' + error.message);
            } finally {
                showLoading(false);
            }
        }

        function displayPack(cards) {
            const grid = document.getElementById('packGrid');
            grid.innerHTML = '';

            cards.forEach((card, index) => {
                const cardSlot = document.createElement('div');
                cardSlot.className = 'card-slot';
                
                const img = document.createElement('img');
                img.src = card.image_url;
                img.alt = card.name;
                img.title = `${card.name} - ${card.rarity}`;
                
                const rarityBadge = document.createElement('div');
                rarityBadge.className = `card-rarity rarity-${card.rarity}`;
                rarityBadge.textContent = card.rarity[0].toUpperCase();
                
                cardSlot.appendChild(img);
                cardSlot.appendChild(rarityBadge);
                grid.appendChild(cardSlot);
            });
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            document.getElementById('generateBtn').disabled = show;
            document.getElementById('randomBtn').disabled = show;
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        // Load sets when page loads
        loadSets();
    </script>
</body>
</html>
