<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Booster Pack Simulator - Pi Commander</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				margin: 20px;
				background-color: #1a1a1a;
				color: #fff;
			}
			.container {
				max-width: 1200px;
				margin: 0 auto;
			}
			.controls {
				background: #2a2a2a;
				padding: 20px;
				border-radius: 8px;
				margin-bottom: 20px;
			}
			select,
			button {
				padding: 10px;
				margin: 5px;
				border: none;
				border-radius: 4px;
				font-size: 16px;
			}
			select {
				background: #3a3a3a;
				color: #fff;
				min-width: 300px;
			}
			button {
				background: #4caf50;
				color: white;
				cursor: pointer;
				padding: 12px 20px;
			}
			button:hover {
				background: #45a049;
			}
			button:disabled {
				background: #666;
				cursor: not-allowed;
			}
			.random-btn {
				background: #ff6b35;
			}
			.random-btn:hover {
				background: #e85a2b;
			}
			.error {
				color: #ff6b6b;
				padding: 10px;
				background: #2a1a1a;
				border-radius: 4px;
				margin: 10px 0;
			}
			.pack-grid {
				display: grid;
				grid-template-columns: repeat(5, 1fr);
				gap: 15px;
				margin-top: 20px;
			}
			.card-slot {
				aspect-ratio: 63/88;
				border: 2px solid #444;
				border-radius: 12px;
				overflow: visible;
				background: #2a2a2a;
				position: relative;
				transition:
					transform 0.25s ease,
					box-shadow 0.25s ease,
					z-index 0s;
			}
			.card-slot.expanded {
				transform: scale(1.18);
				z-index: 10;
				box-shadow: 0 12px 32px rgba(0, 0, 0, 0.7);
			}
			.card-slot.loading {
				background: linear-gradient(45deg, #2a2a2a, #3a3a3a, #2a2a2a);
				background-size: 200% 200%;
				animation: shimmer 1.5s infinite;
			}
			.card-slot.expanded .card-rarity {
				opacity: 0;
				transition: opacity 0.2s ease;
			}
			.card-rarity {
				opacity: 1;
				transition: opacity 0.2s ease;
			}
			@keyframes shimmer {
				0% {
					background-position: 0% 0%;
				}
				50% {
					background-position: 100% 100%;
				}
				100% {
					background-position: 0% 0%;
				}
			}
			.card-slot img {
				position: absolute;
				inset: 0;
				width: 100%;
				height: 100%;
				object-fit: cover;
				border-radius: 10px;
				opacity: 0;
				transition: opacity 0.3s ease;
			}
			.card-slot img.loaded {
				opacity: 1;
			}
			.card-slot .send-overlay {
				position: absolute;
				bottom: 0;
				left: 0;
				right: 0;
				background: rgba(0, 0, 0, 0.75);
				display: none;
				justify-content: center;
				gap: 6px;
				padding: 6px;
				z-index: 10;
			}
			.card-slot.revealed:hover .send-overlay {
				display: flex;
			}
			.send-overlay button {
				background: #4caf50;
				color: #fff;
				border: none;
				border-radius: 4px;
				padding: 4px 8px;
				font-size: 12px;
				cursor: pointer;
			}
			.send-overlay button:hover {
				background: #45a049;
			}
			.card-rarity {
				position: absolute;
				top: 5px;
				right: 5px;
				padding: 2px 6px;
				border-radius: 3px;
				font-size: 12px;
				font-weight: bold;
			}
			.rarity-common {
				background: #8cc8ff;
				color: #000;
			}
			.rarity-uncommon {
				background: #c0c0c0;
				color: #000;
			}
			.rarity-rare {
				background: #ffb366;
				color: #000;
			}
			.rarity-mythic {
				background: #ff6b35;
				color: #fff;
			}
			.rarity-land {
				background: #8b4513;
				color: #fff;
			}
			.rarity-list {
				background: #2c7a2c;
				color: #fff;
			}
			.loading-text {
				position: absolute;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				font-size: 12px;
				color: #ccc;
				text-align: center;
				white-space: nowrap;
			}
			/* QR overlay */
			#sendQrOverlay {
				display: none;
				position: fixed;
				inset: 0;
				background: rgba(0, 0, 0, 0.85);
				z-index: 100;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 16px;
				cursor: pointer;
			}
			#sendQrOverlay.visible {
				display: flex;
			}
			#sendQrOverlay canvas {
				width: 220px;
				height: 220px;
				image-rendering: pixelated;
				background: #fff;
				border-radius: 12px;
			}
			#sendQrOverlay .qr-label {
				color: #fff;
				font-size: 16px;
				word-break: break-all;
			}
			#sendQrOverlay .qr-hint {
				color: #aaa;
				font-size: 13px;
			}
			/* Pack-type badge in set info bar */
			.pack-type-badge {
				display: inline-block;
				padding: 2px 8px;
				border-radius: 4px;
				font-size: 12px;
				font-weight: bold;
				margin-left: 8px;
				vertical-align: middle;
			}
			.pack-type-pre-foil {
				background: #555;
				color: #ccc;
			}
			.pack-type-draft {
				background: #3a6baf;
				color: #fff;
			}
			.pack-type-masters {
				background: #af6b3a;
				color: #fff;
			}
			.pack-type-play {
				background: #7a3aaf;
				color: #fff;
			}
		</style>
		<link rel="stylesheet" href="/static/card-flip.css" />
		<link rel="stylesheet" href="/static/premium-effects.css" />
	</head>
	<body>
		<div class="container">
			<h1>Booster Tutor</h1>

			<div class="controls">
				<div>
					<label for="setSelect">Choose a Set:</label>
					<select id="setSelect">
						<option value="">Loading sets...</option>
					</select>
					<button id="generateBtn" disabled onclick="generatePack()">
						Generate Pack
					</button>
					<button
						id="randomBtn"
						class="random-btn"
						onclick="generateRandomPack()"
					>
						Random Set Pack
					</button>
					<button id="flipAllBtn" style="display: none" onclick="flipAll()">
						Flip All
					</button>
				</div>
				<div
					id="setInfo"
					style="margin-top: 10px; font-size: 14px; color: #ccc"
				></div>
			</div>

			<div id="error" class="error" style="display: none"></div>

			<div id="packGrid" class="pack-grid"></div>
		</div>

		<div id="sendQrOverlay" onclick="hideSendQr()">
			<canvas id="sendQrCanvas" width="220" height="220"></canvas>
			<div class="qr-label" id="sendQrLabel"></div>
			<div class="qr-hint">Tap anywhere to dismiss</div>
		</div>

		<script src="/static/card-flip.js"></script>
		<script>
			const BASE_URL = "http://{{ LOCAL_IP }}{{ DEV_PORT }}";

			// ── Flip mode ─────────────────────────────────────────────────────────────
			// ?flipped=always  → cards render face-up immediately, no click needed
			// ?flipped=auto    → cards start face-down but auto-flip once front is loaded
			// (absent)         → default: cards start face-down, click to reveal
			const FLIP_MODE =
				new URLSearchParams(window.location.search).get("flipped") || "";

			// ── Era cutoff dates ──────────────────────────────────────────────────────
			const FOIL_DEBUT = new Date("1999-02-15"); // Urza's Legacy — first foils
			const PLAY_BOOSTER_DEBUT = new Date("2024-02-02"); // Murders at Karlov Manor

			// Draft-era foil: ~1-in-3 packs has a foil replacing one common
			const DRAFT_FOIL_RATE = 1 / 3;

			// Masters / draft_innovation sets always have a guaranteed foil slot
			const MASTERS_SET_TYPES = new Set(["masters", "draft_innovation"]);

			// ── Rarity weight tables ──────────────────────────────────────────────────

			// Draft-era foil slot (replaces a common): heavily common-weighted
			const DRAFT_FOIL_WEIGHTS = [
				{ rarity: "common", weight: 55 },
				{ rarity: "uncommon", weight: 25 },
				{ rarity: "rare", weight: 15 },
				{ rarity: "mythic", weight: 5 },
			];

			// Masters foil slot: same shape, slightly richer at rare
			const MASTERS_FOIL_WEIGHTS = [
				{ rarity: "common", weight: 50 },
				{ rarity: "uncommon", weight: 25 },
				{ rarity: "rare", weight: 20 },
				{ rarity: "mythic", weight: 5 },
			];

			// Play Booster — non-foil wildcard (slot 13)
			// Source: WotC published odds ~62/30/7/0.7
			const PLAY_WILDCARD_NF_WEIGHTS = [
				{ rarity: "common", weight: 62.1 },
				{ rarity: "uncommon", weight: 30.0 },
				{ rarity: "rare", weight: 7.06 },
				{ rarity: "mythic", weight: 0.73 },
			];

			// Play Booster — foil wildcard (slot 14)
			// Source: WotC published odds ~50/31/15/3.5
			const PLAY_WILDCARD_FOIL_WEIGHTS = [
				{ rarity: "common", weight: 50.0 },
				{ rarity: "uncommon", weight: 31.0 },
				{ rarity: "rare", weight: 15.0 },
				{ rarity: "mythic", weight: 3.5 },
			];

			// ── Weighted random rarity picker ─────────────────────────────────────────
			function rollWeightedRarity(weights) {
				const total = weights.reduce((s, r) => s + r.weight, 0);
				let roll = Math.random() * total;
				for (const { rarity, weight } of weights) {
					roll -= weight;
					if (roll <= 0) return rarity;
				}
				return weights[0].rarity;
			}

			// ── Play Booster List/CU slot resolution ──────────────────────────────────
			// Slot 7 in a Play Booster:
			//   87.50% → common from set
			//    9.38% → common or uncommon from The List (plist)
			//    1.56% → rare or mythic from The List (plist)
			//    1.56% → Special Guest (treat same as List rare/mythic; plist "rare")
			// Returns: { setCode, apiRarity, type, label }
			function rollListCuSlot(setCode) {
				const roll = Math.random() * 100;
				if (roll < 87.5) {
					return {
						setCode,
						apiRarity: "common",
						type: "common",
						label: "Common",
					};
				} else if (roll < 87.5 + 9.38) {
					const r = Math.random() < 0.5 ? "common" : "uncommon";
					return {
						setCode: "plist",
						apiRarity: r,
						type: "list",
						label: "📋 List",
					};
				} else {
					const r = Math.random() < 1 / 8 ? "mythic" : "rare";
					return {
						setCode: "plist",
						apiRarity: r,
						type: "list",
						label: "📋 List",
					};
				}
			}

			let allSets = [];
			let currentGeneration = null;
			let packSize = 15;

			// ── Pack profile ──────────────────────────────────────────────────────────
			function getPackProfile(set) {
				const setDate = new Date(set.released_at);
				const setType = set.set_type || "";

				if (setDate < FOIL_DEBUT) {
					return {
						format: "pre-foil",
						packLabel: "Pre-Foil",
						foilGuaranteed: false,
						foilRate: 0,
						foilReplacesCommon: false,
					};
				}
				if (MASTERS_SET_TYPES.has(setType)) {
					return {
						format: "masters",
						packLabel: "Masters",
						foilGuaranteed: true,
						foilRate: 1,
						foilReplacesCommon: false,
					};
				}
				if (setDate >= PLAY_BOOSTER_DEBUT) {
					return {
						format: "play",
						packLabel: "Play Booster",
						foilGuaranteed: true,
						foilRate: 1,
						foilReplacesCommon: false,
					};
				}
				return {
					format: "draft",
					packLabel: "Draft Booster",
					foilGuaranteed: false,
					foilRate: DRAFT_FOIL_RATE,
					foilReplacesCommon: true,
				};
			}

			// ── Slot manifest builder ─────────────────────────────────────────────────
			//
			// All random decisions (foil hit? list outcome? wildcard rarities?) are
			// resolved HERE so the grid placeholders and the generation loop are always
			// in sync — no decision is made twice.
			//
			// Each slot descriptor:
			//   { type, label, apiRarity, isFoil, setCode }
			//
			// Play Booster slot order (matches physical pack order):
			//   1–6  commons
			//   7    list/CU  (resolved 4-way)
			//   8–10 uncommons
			//   11   rare/mythic
			//   12   land
			//   13   non-foil wildcard  (any rarity, non-foil)
			//   14   foil wildcard      (any rarity, always foil)
			//
			// Draft Booster slot order:
			//   commons (9 or 10) → uncommons → rare → foil (if hit) → land
			//
			// Masters slot order:
			//   10 commons → 3 uncommons → rare → foil
			//
			function buildSlotManifest(set, profile, hasFoil) {
				const code = set.code;
				const slots = [];

				if (profile.format === "play") {
					for (let i = 0; i < 6; i++)
						slots.push({
							type: "common",
							label: "Common",
							apiRarity: "common",
							isFoil: false,
							setCode: code,
						});

					slots.push(rollListCuSlot(code));

					for (let i = 0; i < 3; i++)
						slots.push({
							type: "uncommon",
							label: "Uncommon",
							apiRarity: "uncommon",
							isFoil: false,
							setCode: code,
						});

					slots.push({
						type: "rare",
						label: "Rare",
						apiRarity: "rare",
						isFoil: false,
						setCode: code,
					});

					slots.push({
						type: "land",
						label: "Land",
						apiRarity: "land",
						isFoil: false,
						setCode: code,
					});

					const nfRarity = rollWeightedRarity(PLAY_WILDCARD_NF_WEIGHTS);
					slots.push({
						type: "wildcard-nf",
						label: "🃏 Wild",
						apiRarity: nfRarity,
						isFoil: false,
						setCode: code,
					});

					const foilRarity = rollWeightedRarity(PLAY_WILDCARD_FOIL_WEIGHTS);
					slots.push({
						type: "wildcard-foil",
						label: "✨ Wild",
						apiRarity: foilRarity,
						isFoil: true,
						setCode: code,
					});
				} else if (profile.format === "masters") {
					for (let i = 0; i < 10; i++)
						slots.push({
							type: "common",
							label: "Common",
							apiRarity: "common",
							isFoil: false,
							setCode: code,
						});
					for (let i = 0; i < 3; i++)
						slots.push({
							type: "uncommon",
							label: "Uncommon",
							apiRarity: "uncommon",
							isFoil: false,
							setCode: code,
						});
					slots.push({
						type: "rare",
						label: "Rare",
						apiRarity: "rare",
						isFoil: false,
						setCode: code,
					});
					const foilRarity = rollWeightedRarity(MASTERS_FOIL_WEIGHTS);
					slots.push({
						type: "foil",
						label: "✨ Foil",
						apiRarity: foilRarity,
						isFoil: true,
						setCode: code,
					});
				} else {
					// Draft / Pre-foil
					const commonCount = hasFoil && profile.foilReplacesCommon ? 9 : 10;
					for (let i = 0; i < commonCount; i++)
						slots.push({
							type: "common",
							label: "Common",
							apiRarity: "common",
							isFoil: false,
							setCode: code,
						});
					for (let i = 0; i < 3; i++)
						slots.push({
							type: "uncommon",
							label: "Uncommon",
							apiRarity: "uncommon",
							isFoil: false,
							setCode: code,
						});
					slots.push({
						type: "rare",
						label: "Rare",
						apiRarity: "rare",
						isFoil: false,
						setCode: code,
					});
					if (hasFoil) {
						const foilRarity = rollWeightedRarity(DRAFT_FOIL_WEIGHTS);
						slots.push({
							type: "foil",
							label: "✨ Foil",
							apiRarity: foilRarity,
							isFoil: true,
							setCode: code,
						});
					}
					slots.push({
						type: "land",
						label: "Land",
						apiRarity: "land",
						isFoil: false,
						setCode: code,
					});
				}

				return slots;
			}

			// ── QR overlay ────────────────────────────────────────────────────────────
			let sendQrLibLoaded = false;
			async function ensureSendQrLib() {
				if (sendQrLibLoaded) return;
				await new Promise((resolve, reject) => {
					const s = document.createElement("script");
					s.src =
						"https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js";
					s.onload = resolve;
					s.onerror = () => reject(new Error("Failed to load QR library"));
					document.head.appendChild(s);
				});
				sendQrLibLoaded = true;
			}

			function drawQrToCanvas(text, canvas) {
				const qr = window.qrcode(0, "M");
				qr.addData(text);
				qr.make();
				const ctx = canvas.getContext("2d");
				const count = qr.getModuleCount();
				const size = canvas.width;
				const scale = Math.floor(size / count);
				const offset = Math.floor((size - count * scale) / 2);
				ctx.fillStyle = "#fff";
				ctx.fillRect(0, 0, size, size);
				ctx.fillStyle = "#000";
				for (let r = 0; r < count; r++)
					for (let c = 0; c < count; c++)
						if (qr.isDark(r, c))
							ctx.fillRect(
								offset + c * scale,
								offset + r * scale,
								scale,
								scale,
							);
			}

			function playerPath(p) {
				return p === 1 ? "/face" : `/player${p}`;
			}

			async function showSendQr(player) {
				const url = `${BASE_URL}${playerPath(player)}`;
				document.getElementById("sendQrLabel").textContent = url;
				const canvas = document.getElementById("sendQrCanvas");
				try {
					await ensureSendQrLib();
					drawQrToCanvas(url, canvas);
				} catch {
					/* skip */
				}
				document.getElementById("sendQrOverlay").classList.add("visible");
			}

			function hideSendQr() {
				document.getElementById("sendQrOverlay").classList.remove("visible");
			}

			function flipAll() {
				for (let i = 0; i < packSize; i++) {
					const slot = document.getElementById(`card-slot-${i}`);
					if (slot && slot.dataset.faceIndex === "-1") slot.click();
				}
			}

			// ── Set loading ───────────────────────────────────────────────────────────
			async function loadSets() {
				try {
					const response = await fetch("/api/booster/sets");
					const data = await response.json();
					if (data.error) throw new Error(data.error);
					allSets = data.sets;
					populateSetSelect();
				} catch (error) {
					showError("Failed to load sets: " + error.message);
				}
			}

			function populateSetSelect() {
				const select = document.getElementById("setSelect");
				select.innerHTML = '<option value="">-- Choose a set --</option>';

				const sortedSets = allSets
					.filter((set) => set.card_count > 0)
					.sort((a, b) => new Date(b.released_at) - new Date(a.released_at));

				sortedSets.forEach((set) => {
					const option = document.createElement("option");
					option.value = set.code;
					option.textContent = `${set.name} (${set.released_at})`;
					option.setAttribute("data-icon", set.icon_svg_uri || "");
					select.appendChild(option);
				});

				select.addEventListener("change", function () {
					document.getElementById("generateBtn").disabled = !this.value;
					if (this.value) {
						updateSetInfo(allSets.find((s) => s.code === this.value));
					} else {
						document.getElementById("setInfo").innerHTML = "";
					}
				});
			}

			function updateSetInfo(set) {
				const profile = getPackProfile(set);
				let html = `<span style="font-family:monospace;background:#3a3a3a;padding:2px 6px;border-radius:3px;margin-right:8px">${set.code}</span>${set.card_count} cards • Released: ${set.released_at}<span class="pack-type-badge pack-type-${profile.format}">${profile.packLabel}</span>`;
				if (set.icon_svg_uri) {
					html =
						`<img src="${set.icon_svg_uri}" alt="${set.name} icon" style="width:20px;height:20px;margin-right:8px;vertical-align:middle">` +
						html;
				}
				document.getElementById("setInfo").innerHTML = html;
			}

			// ── Pack generation ───────────────────────────────────────────────────────
			async function generatePack() {
				const setCode = document.getElementById("setSelect").value;
				if (!setCode) return;
				await generatePackForSet(setCode);
			}

			async function generateRandomPack() {
				const eligibleSets = allSets.filter((set) => set.card_count > 50);
				const randomSet =
					eligibleSets[Math.floor(Math.random() * eligibleSets.length)];
				document.getElementById("setSelect").value = randomSet.code;
				updateSetInfo(randomSet);
				await generatePackForSet(randomSet.code);
			}

			async function generatePackForSet(setCode) {
				if (currentGeneration) currentGeneration.cancelled = true;

				const selectedSet = allSets.find((s) => s.code === setCode);
				const profile = getPackProfile(selectedSet);

				const hasFoil =
					profile.foilGuaranteed ||
					(profile.foilRate > 0 && Math.random() < profile.foilRate);

				const slots = buildSlotManifest(selectedSet, profile, hasFoil);
				packSize = slots.length;

				currentGeneration = { cancelled: false, cardCount: 0, slots };
				document.getElementById("generateBtn").disabled = true;
				document.getElementById("randomBtn").disabled = true;
				hideError();
				setupPackGrid(slots);

				try {
					await generatePackProgressive(setCode, currentGeneration);
				} catch (error) {
					if (!currentGeneration.cancelled)
						showError("Failed to generate pack: " + error.message);
				} finally {
					document.getElementById("generateBtn").disabled = false;
					document.getElementById("randomBtn").disabled = false;
					if (!currentGeneration.cancelled) currentGeneration = null;
				}
			}

			// ── Grid setup ────────────────────────────────────────────────────────────
			function setupPackGrid(slots) {
				document.getElementById("flipAllBtn").style.display = "none";
				document.getElementById("flipAllBtn").textContent = "Flip All";
				const grid = document.getElementById("packGrid");
				grid.innerHTML = "";

				for (let i = 0; i < slots.length; i++) {
					const cardSlot = document.createElement("div");
					cardSlot.className = "card-slot loading";
					cardSlot.id = `card-slot-${i}`;

					const loadingText = document.createElement("div");
					loadingText.className = "loading-text";
					loadingText.textContent = slots[i].label;

					cardSlot.appendChild(loadingText);
					grid.appendChild(cardSlot);
				}
			}

			// ── Progressive fetch ──────────────────────────────────��──────────────────
			async function generatePackProgressive(setCode, generation) {
				const usedCardIds = new Set();
				const { slots } = generation;

				for (let i = 0; i < slots.length; i++) {
					if (generation.cancelled) return;

					const slot = slots[i];

					try {
						const card = await fetchSingleCard(
							slot.setCode,
							slot.apiRarity,
							usedCardIds,
						);
						if (!generation.cancelled && card) {
							displayCard(card, i, slot.isFoil, slot.type);
							usedCardIds.add(card.id);
							generation.cardCount++;
						}
					} catch (error) {
						if (slot.type === "land") {
							// No basic lands in this set — fall back to an extra common
							console.log(
								"No common lands in this set, replacing land slot with common",
							);
							try {
								const card = await fetchSingleCard(
									setCode,
									"common",
									usedCardIds,
								);
								if (!generation.cancelled && card) {
									displayCard(card, i, false, "common");
									usedCardIds.add(card.id);
									generation.cardCount++;
								}
							} catch (fb) {
								console.error(
									"Failed to fetch fallback common for land slot:",
									fb,
								);
							}
						} else {
							console.error(
								`Failed to fetch slot ${i} (${slot.label}):`,
								error,
							);
						}
					}
				}

				if (!generation.cancelled) {
					document.getElementById("flipAllBtn").style.display = "";
				}
			}

			// ── Single-card fetch ─────────────────────────────────────────────────────
			async function fetchSingleCard(setCode, rarity, usedCardIds = new Set()) {
				const maxAttempts = 20;
				for (let attempts = 0; attempts < maxAttempts; attempts++) {
					const response = await fetch("/api/booster/single", {
						method: "POST",
						headers: { "Content-Type": "application/json" },
						body: JSON.stringify({
							set_code: setCode,
							rarity: rarity,
							exclude_ids: Array.from(usedCardIds),
						}),
					});

					if (response.status === 404) {
						const data = await response.json();
						throw new Error(data.error || `No ${rarity} cards available`);
					}

					const data = await response.json();
					if (data.error) throw new Error(data.error);

					const card = data.card;

					// Re-roll if a non-land common slot accidentally returned a basic land
					if (rarity === "common" && card.is_common_land) {
						console.log(
							`Re-rolling common land: ${card.name} (attempt ${attempts + 1})`,
						);
						usedCardIds.add(card.id);
						continue;
					}

					return card;
				}

				throw new Error(
					`Failed to get non-basic ${rarity} card after ${maxAttempts} attempts`,
				);
			}

			// ── Card display ──────────────────────────────────────────────────────────
			//
			// slotType is the FINAL resolved type — never a prediction.
			// Badge is derived from what actually happened:
			//
			//   isFoil=true              → ✨  (card's actual rarity colour)
			//   slotType="land"          → L   (brown)
			//   slotType="list"          → 📋  (green)  — only when list roll hit
			//   slotType="wildcard-nf"   → 🃏  (card's actual rarity colour)
			//   slotType="wildcard-foil" → ✨🃏 shown as ✨ (foil takes precedence)
			//   anything else            → first letter of card's actual rarity
			//
			// FLIP_MODE behaviour:
			//   "always" → card starts face-up immediately (no animation, no click needed)
			//   "auto"   → card starts face-down (cardback.jpg), flips once front is loaded
			//   ""       → default: face-down, click to reveal
			//
			function displayCard(
				card,
				slotIndex,
				isFoil = false,
				slotType = "common",
			) {
				const cardSlot = document.getElementById(`card-slot-${slotIndex}`);
				if (!cardSlot) return;

				cardSlot.innerHTML = "";
				cardSlot.className = "card-slot";

				const faces = [card.image_url, card.back_image_url || "/cardback.jpg"];
				const isDFC = !!card.back_image_url;

				const img = document.createElement("img");
				img.alt = "Card back";
				img.title = "Click to reveal";

				// Badge — driven by actual outcome
				const rarityBadge = document.createElement("div");
				let badgeClass, badgeText;

				if (isFoil) {
					badgeClass = card.rarity;
					badgeText = "✨";
				} else if (slotType === "land") {
					badgeClass = "land";
					badgeText = "L";
				} else if (slotType === "list") {
					badgeClass = "list";
					badgeText = "📋";
				} else if (slotType === "wildcard-nf") {
					badgeClass = card.rarity;
					badgeText = "🃏";
				} else {
					badgeClass = card.rarity;
					badgeText = card.rarity[0].toUpperCase();
				}

				rarityBadge.className = `card-rarity rarity-${badgeClass}`;
				rarityBadge.textContent = badgeText;
				rarityBadge.style.display = "none";

				// Send-to-player overlay
				const sendOverlay = document.createElement("div");
				sendOverlay.className = "send-overlay";
				[1, 2, 3, 4].forEach((p) => {
					const btn = document.createElement("button");
					btn.textContent = `P${p}`;
					btn.title = `Send to Player ${p}`;
					btn.addEventListener("click", async (e) => {
						e.stopPropagation();
						btn.disabled = true;
						btn.textContent = "...";
						try {
							const r = await fetch(`/api/send/${p}`, {
								method: "POST",
								headers: { "Content-Type": "application/json" },
								body: JSON.stringify({
									q: card.name,
									premium: isFoil ? "foil" : null,
								}),
							});
							btn.textContent = r.ok ? "✓" : "✗";
							if (r.ok) showSendQr(p);
						} catch {
							btn.textContent = "✗";
						}
						setTimeout(() => {
							btn.textContent = `P${p}`;
							btn.disabled = false;
						}, 1500);
					});
					sendOverlay.appendChild(btn);
				});

				cardSlot.appendChild(img);
				cardSlot.appendChild(rarityBadge);
				cardSlot.appendChild(sendOverlay);

				let faceIndex = -1;
				cardSlot.dataset.faceIndex = "-1";

				function applyFaceState(index) {
					if (index === -1) {
						img.alt = "Card back";
						img.title = "Click to reveal";
						rarityBadge.style.display = "none";
						cardSlot.classList.remove("foil", "revealed");
					} else if (index === 0) {
						img.alt = card.name;
						img.title = isDFC
							? `${card.name} - click to see back face`
							: `${card.name} - ${card.rarity}${isFoil ? " ✨" : ""}`;
						rarityBadge.style.display = "";
						if (isFoil) cardSlot.classList.add("foil");
						cardSlot.classList.add("revealed");
					} else {
						img.alt = `${card.name} (back face)`;
						img.title = `${card.name} - click to flip`;
						rarityBadge.style.display = "";
						if (isFoil) cardSlot.classList.add("foil");
						cardSlot.classList.add("revealed");
					}
					faceIndex = index;
					cardSlot.dataset.faceIndex = String(index);
				}

				function flipTo(nextIndex) {
					const nextSrc = nextIndex === -1 ? "/cardback.jpg" : faces[nextIndex];
					animatedCardFlip(img, nextSrc, () => applyFaceState(nextIndex));
				}

				if (FLIP_MODE === "always") {
					// Load the front face directly — no cardback, no animation
					img.onload = () => {
						img.classList.add("loaded");
						applyFaceState(0);
					};
					img.src = faces[0];
				} else if (FLIP_MODE === "auto") {
					// Start with cardback, flip to front as soon as it has loaded
					img.src = "/cardback.jpg";
					img.onload = () => img.classList.add("loaded");

					const preload = new Image();
					preload.onload = () => {
						if (faceIndex === -1) flipTo(0);
					};
					preload.src = faces[0];
				} else {
					// Default: cardback, click to reveal
					img.src = "/cardback.jpg";
					img.onload = () => img.classList.add("loaded");
				}

				cardSlot.addEventListener("pointerenter", (e) => {
					if (e.pointerType === "mouse") cardSlot.classList.add("expanded");
				});
				cardSlot.addEventListener("pointerleave", (e) => {
					if (e.pointerType === "mouse") cardSlot.classList.remove("expanded");
				});
				cardSlot.addEventListener("pointerdown", (e) => {
					if (e.pointerType !== "mouse") {
						const wasExpanded = cardSlot.classList.contains("expanded");
						document
							.querySelectorAll(".card-slot.expanded")
							.forEach((el) => el.classList.remove("expanded"));
						if (!wasExpanded) {
							cardSlot.classList.add("expanded");
							e.stopPropagation();
						}
					}
				});
				cardSlot.addEventListener("click", () => {
					if (
						img.classList.contains("flipping-out") ||
						img.classList.contains("flipping-in")
					)
						return;
					if (faceIndex === -1) flipTo(0);
					else if (isDFC) flipTo(faceIndex === 0 ? 1 : 0);
					else flipTo(faceIndex === 0 ? -1 : 0);
				});
			}

			document.addEventListener("pointerdown", (e) => {
				if (!e.target.closest(".card-slot"))
					document
						.querySelectorAll(".card-slot.expanded")
						.forEach((el) => el.classList.remove("expanded"));
			});

			function showError(message) {
				const errorDiv = document.getElementById("error");
				errorDiv.textContent = message;
				errorDiv.style.display = "block";
			}

			function hideError() {
				document.getElementById("error").style.display = "none";
			}

			loadSets();
		</script>
	</body>
</html>
