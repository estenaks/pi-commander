<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Booster Pack Simulator - Pi Commander</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				margin: 20px;
				background-color: #1a1a1a;
				color: #fff;
			}
			.container {
				max-width: 1200px;
				margin: 0 auto;
			}
			.controls {
				background: #2a2a2a;
				padding: 20px;
				border-radius: 8px;
				margin-bottom: 20px;
			}
			select,
			button {
				padding: 10px;
				margin: 5px;
				border: none;
				border-radius: 4px;
				font-size: 16px;
			}
			select {
				background: #3a3a3a;
				color: #fff;
				min-width: 300px;
			}
			button {
				background: #4caf50;
				color: white;
				cursor: pointer;
				padding: 12px 20px;
			}
			button:hover {
				background: #45a049;
			}
			button:disabled {
				background: #666;
				cursor: not-allowed;
			}
			.random-btn {
				background: #ff6b35;
			}
			.random-btn:hover {
				background: #e85a2b;
			}
			.loading {
				text-align: center;
				padding: 20px;
				font-style: italic;
			}
			.error {
				color: #ff6b6b;
				padding: 10px;
				background: #2a1a1a;
				border-radius: 4px;
				margin: 10px 0;
			}
			.progress {
				margin: 10px 0;
				font-size: 14px;
				color: #ccc;
			}
			.pack-grid {
				display: grid;
				grid-template-columns: repeat(5, 1fr);
				gap: 15px;
				margin-top: 20px;
			}
			.card-slot {
				aspect-ratio: 63/88;
				border: 2px solid #444;
				border-radius: 12px;
				overflow: visible;
				background: #2a2a2a;
				position: relative;
				transition:
					transform 0.25s ease,
					box-shadow 0.25s ease,
					z-index 0s;
			}
			.card-slot.expanded {
				transform: scale(1.18);
				z-index: 10;
				box-shadow: 0 12px 32px rgba(0, 0, 0, 0.7);
			}
			.card-slot.loading {
				background: linear-gradient(45deg, #2a2a2a, #3a3a3a, #2a2a2a);
				background-size: 200% 200%;
				animation: shimmer 1.5s infinite;
			}
			.card-slot.loaded {
				border-color: #4caf50;
				transform: scale(1.02);
			}
			.card-slot.expanded .card-rarity {
				opacity: 0;
				transition: opacity 0.2s ease;
			}
			.card-rarity {
				opacity: 1;
				transition: opacity 0.2s ease;
			}
			@keyframes shimmer {
				0% {
					background-position: 0% 0%;
				}
				50% {
					background-position: 100% 100%;
				}
				100% {
					background-position: 0% 0%;
				}
			}
			.card-slot img {
				width: 100%;
				height: 100%;
				object-fit: cover;
				opacity: 0;
				transition: opacity 0.3s ease;
			}
			.card-slot img.loaded {
				opacity: 1;
			}
			.card-slot .send-overlay {
				position: absolute;
				bottom: 0;
				left: 0;
				right: 0;
				background: rgba(0, 0, 0, 0.75);
				display: none;
				justify-content: center;
				gap: 6px;
				padding: 6px;
				z-index: 10;
			}
			.card-slot.revealed:hover .send-overlay {
				display: flex;
			}
			.send-overlay button {
				background: #4caf50;
				color: #fff;
				border: none;
				border-radius: 4px;
				padding: 4px 8px;
				font-size: 12px;
				cursor: pointer;
			}
			.send-overlay button:hover {
				background: #45a049;
			}
			.card-rarity {
				position: absolute;
				top: 5px;
				right: 5px;
				padding: 2px 6px;
				border-radius: 3px;
				font-size: 12px;
				font-weight: bold;
			}
			.rarity-common {
				background: #8cc8ff;
				color: #000;
			}
			.rarity-uncommon {
				background: #c0c0c0;
				color: #000;
			}
			.rarity-rare {
				background: #ffb366;
				color: #000;
			}
			.rarity-mythic {
				background: #ff6b35;
				color: #fff;
			}
			.rarity-land {
				background: #8b4513;
				color: #fff;
			}
			.rarity-wildcard {
				background: #9b59b6;
				color: #fff;
			}
			.rarity-list {
				background: #2c7a2c;
				color: #fff;
			}
			.loading-text {
				position: absolute;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				font-size: 12px;
				color: #ccc;
			}
			/* QR overlay shown after sending a card to a player */
			#sendQrOverlay {
				display: none;
				position: fixed;
				inset: 0;
				background: rgba(0, 0, 0, 0.85);
				z-index: 100;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 16px;
				cursor: pointer;
			}
			#sendQrOverlay.visible {
				display: flex;
			}
			#sendQrOverlay canvas {
				width: 220px;
				height: 220px;
				image-rendering: pixelated;
				background: #fff;
				border-radius: 12px;
			}
			#sendQrOverlay .qr-label {
				color: #fff;
				font-size: 16px;
				word-break: break-all;
			}
			#sendQrOverlay .qr-hint {
				color: #aaa;
				font-size: 13px;
			}
			/* Pack type badge shown in set info */
			.pack-type-badge {
				display: inline-block;
				padding: 2px 8px;
				border-radius: 4px;
				font-size: 12px;
				font-weight: bold;
				margin-left: 8px;
				vertical-align: middle;
			}
			.pack-type-draft {
				background: #3a6baf;
				color: #fff;
			}
			.pack-type-play {
				background: #7a3aaf;
				color: #fff;
			}
			.pack-type-masters {
				background: #af6b3a;
				color: #fff;
			}
		</style>
		<link rel="stylesheet" href="/static/card-flip.css" />
		<link rel="stylesheet" href="/static/premium-effects.css" />
	</head>
	<body>
		<div class="container">
			<h1>Booster Tutor</h1>

			<div class="controls">
				<div>
					<label for="setSelect">Choose a Set:</label>
					<select id="setSelect">
						<option value="">Loading sets...</option>
					</select>
					<button id="generateBtn" disabled onclick="generatePack()">
						Generate Pack
					</button>
					<button
						id="randomBtn"
						class="random-btn"
						onclick="generateRandomPack()"
					>
						Random Set Pack
					</button>
					<button id="flipAllBtn" style="display: none" onclick="flipAll()">
						Flip All
					</button>
				</div>
				<div
					id="setInfo"
					style="margin-top: 10px; font-size: 14px; color: #ccc"
				></div>
				<div id="progress" class="progress" style="display: none"></div>
			</div>

			<div id="loading" class="loading" style="display: none">
				Preparing your booster pack...
			</div>

			<div id="error" class="error" style="display: none"></div>

			<div id="packGrid" class="pack-grid"></div>
		</div>
		<div id="sendQrOverlay" onclick="hideSendQr()">
			<canvas id="sendQrCanvas" width="220" height="220"></canvas>
			<div class="qr-label" id="sendQrLabel"></div>
			<div class="qr-hint">Tap anywhere to dismiss</div>
		</div>
		<script src="/static/card-flip.js"></script>
		<script>
			const BASE_URL = "http://{{ LOCAL_IP }}{{ DEV_PORT }}";

			// ── Era cutoff dates ──────────────────────────────────────────────────────
			// Foils first appeared in Urza's Legacy (1999-02-15).
			// Play Boosters replaced Draft+Set boosters from Murders at Karlov Manor
			// (2024-02-02) onwards.
			const FOIL_DEBUT = new Date("1999-02-15"); // first set with foils
			const PLAY_BOOSTER_DEBUT = new Date("2024-02-02"); // Murders at Karlov Manor

			// ── Foil rates by era ─────────────────────────────────────────────────────
			// Draft era (1999-02-15 → 2024-02-01):
			//   ~1-in-3 packs contain a foil that REPLACES one common.
			//   This means one of the 10 common slots has a ~1/3 chance of being foil.
			//   We model this as a single pack-level roll.
			const DRAFT_FOIL_RATE = 1 / 3;

			// Play Booster era (2024-02-02+):
			//   Every pack has exactly 1 guaranteed foil in a dedicated slot.
			//   No roll needed — it's always present.

			// ── Masters / draft_innovation pack sizes ─────────────────────────────────
			// Masters sets: 15 cards — 10 commons, 3 uncommons, 1 rare, 1 foil (guaranteed)
			// (Masters sets always have a guaranteed foil regardless of era)
			const MASTERS_SET_TYPES = new Set(["masters", "draft_innovation"]);

			let allSets = [];
			let currentGeneration = null;
			let packSize = 15;

			// ── Send QR overlay ───────────────────────────────────────────────────────
			let sendQrLibLoaded = false;
			async function ensureSendQrLib() {
				if (sendQrLibLoaded) return;
				await new Promise((resolve, reject) => {
					const s = document.createElement("script");
					s.src =
						"https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js";
					s.onload = resolve;
					s.onerror = () => reject(new Error("Failed to load QR library"));
					document.head.appendChild(s);
				});
				sendQrLibLoaded = true;
			}

			function drawQrToCanvas(text, canvas) {
				const qr = window.qrcode(0, "M");
				qr.addData(text);
				qr.make();
				const ctx = canvas.getContext("2d");
				const count = qr.getModuleCount();
				const size = canvas.width;
				const scale = Math.floor(size / count);
				const offset = Math.floor((size - count * scale) / 2);
				ctx.fillStyle = "#fff";
				ctx.fillRect(0, 0, size, size);
				ctx.fillStyle = "#000";
				for (let r = 0; r < count; r++)
					for (let c = 0; c < count; c++)
						if (qr.isDark(r, c))
							ctx.fillRect(
								offset + c * scale,
								offset + r * scale,
								scale,
								scale,
							);
			}

			function playerPath(p) {
				return p === 1 ? "/face" : `/player${p}`;
			}

			async function showSendQr(player) {
				const url = `${BASE_URL}${playerPath(player)}`;
				document.getElementById("sendQrLabel").textContent = url;
				const canvas = document.getElementById("sendQrCanvas");
				try {
					await ensureSendQrLib();
					drawQrToCanvas(url, canvas);
				} catch {
					/* silently skip QR if lib fails */
				}
				document.getElementById("sendQrOverlay").classList.add("visible");
			}

			function hideSendQr() {
				document.getElementById("sendQrOverlay").classList.remove("visible");
			}

			function flipAll() {
				for (let i = 0; i < packSize; i++) {
					const slot = document.getElementById(`card-slot-${i}`);
					if (slot && slot.dataset.faceIndex === "-1") slot.click();
				}
			}

			// ── Pack type determination ───────────────────────────────────────────────
			/**
			 * Given a set object from the API, return a descriptor for which booster
			 * format this set uses and what foil behaviour to apply.
			 *
			 * Returns an object:
			 * {
			 *   format:          "pre-foil" | "draft" | "masters" | "play",
			 *   packSize:        number,           // total playable card slots
			 *   foilGuaranteed:  boolean,          // is there always a foil?
			 *   foilRate:        number,            // 0–1 probability (ignored if guaranteed)
			 *   foilReplacesCommon: boolean,        // true = foil takes a common slot
			 *   label:           string,            // human-readable badge
			 * }
			 */
			function getPackProfile(set) {
				const setDate = new Date(set.released_at);
				const setType = set.set_type || "";

				// Era 0: no foils at all
				if (setDate < FOIL_DEBUT) {
					return {
						format: "pre-foil",
						packSize: 15,
						foilGuaranteed: false,
						foilRate: 0,
						foilReplacesCommon: false,
						label: "Pre-Foil",
					};
				}

				// Masters / draft_innovation sets always have a guaranteed foil slot
				// regardless of era (they were designed that way from inception).
				// Structure: 10 commons, 3 uncommons, 1 rare/mythic, 1 foil (any rarity)
				if (MASTERS_SET_TYPES.has(setType)) {
					return {
						format: "masters",
						packSize: 15,
						foilGuaranteed: true,
						foilRate: 1,
						foilReplacesCommon: false, // dedicated slot
						label: "Masters",
					};
				}

				// Era 3: Play Boosters (Murders at Karlov Manor 2024-02-02+)
				// Structure: 6 commons, 3 uncommons, 1 rare/mythic, 1 wildcard (any rarity),
				//            1 list/CU slot, 1 guaranteed foil (any rarity), 1 land = 14 slots
				if (setDate >= PLAY_BOOSTER_DEBUT) {
					return {
						format: "play",
						packSize: 14,
						foilGuaranteed: true,
						foilRate: 1,
						foilReplacesCommon: false, // dedicated foil slot
						label: "Play Booster",
					};
				}

				// Era 1 & 2: Classic Draft Boosters (1999-02-15 → 2024-02-01)
				// ~1-in-3 packs have a foil that REPLACES one of the 10 commons.
				// The pack size stays at 15 whether or not there's a foil.
				return {
					format: "draft",
					packSize: 15,
					foilGuaranteed: false,
					foilRate: DRAFT_FOIL_RATE,
					foilReplacesCommon: true,
					label: "Draft Booster",
				};
			}

			// ── Foil rarity weights (used when picking a foil from "any" rarity) ──────
			// In any era where the foil slot can be any rarity, the distribution is
			// heavily weighted toward commons.  These weights are approximate and match
			// real-world pull rates:
			//   common   ~55%,  uncommon ~25%,  rare ~15%,  mythic ~5%
			// The backend "any" rarity pick already selects uniformly from all cards, so
			// these weights are applied client-side when deciding what *type* of card to
			// request for the foil slot.
			const FOIL_RARITY_WEIGHTS = [
				{ rarity: "common", weight: 55 },
				{ rarity: "uncommon", weight: 25 },
				{ rarity: "rare", weight: 15 },
				{ rarity: "mythic", weight: 5 },
			];

			function rollFoilRarity() {
				const total = FOIL_RARITY_WEIGHTS.reduce((s, r) => s + r.weight, 0);
				let roll = Math.random() * total;
				for (const { rarity, weight } of FOIL_RARITY_WEIGHTS) {
					roll -= weight;
					if (roll <= 0) return rarity;
				}
				return "common";
			}

			// ── Wildcard rarity weights for Play Booster wildcard slot ────────────────
			// Play Booster wildcard: ~56% common, ~26% uncommon, ~14% rare, ~4% mythic
			const WILDCARD_RARITY_WEIGHTS = [
				{ rarity: "common", weight: 56 },
				{ rarity: "uncommon", weight: 26 },
				{ rarity: "rare", weight: 14 },
				{ rarity: "mythic", weight: 4 },
			];

			function rollWildcardRarity() {
				const total = WILDCARD_RARITY_WEIGHTS.reduce((s, r) => s + r.weight, 0);
				let roll = Math.random() * total;
				for (const { rarity, weight } of WILDCARD_RARITY_WEIGHTS) {
					roll -= weight;
					if (roll <= 0) return rarity;
				}
				return "common";
			}

			// ── Load sets on page load ────────────────────────────────────────────────
			async function loadSets() {
				try {
					const response = await fetch("/api/booster/sets");
					const data = await response.json();

					if (data.error) {
						throw new Error(data.error);
					}

					allSets = data.sets;
					populateSetSelect();
				} catch (error) {
					showError("Failed to load sets: " + error.message);
				}
			}

			function populateSetSelect() {
				const select = document.getElementById("setSelect");
				select.innerHTML = '<option value="">-- Choose a set --</option>';

				// Sort sets by release date (newest first)
				const sortedSets = allSets
					.filter((set) => set.card_count > 0)
					.sort((a, b) => new Date(b.released_at) - new Date(a.released_at));

				sortedSets.forEach((set) => {
					const option = document.createElement("option");
					option.value = set.code;
					option.textContent = `${set.name} (${set.released_at})`;
					option.setAttribute("data-icon", set.icon_svg_uri || "");
					select.appendChild(option);
				});

				select.addEventListener("change", function () {
					const generateBtn = document.getElementById("generateBtn");
					generateBtn.disabled = !this.value;

					if (this.value) {
						const selectedSet = allSets.find((s) => s.code === this.value);
						updateSetInfo(selectedSet);
					} else {
						document.getElementById("setInfo").innerHTML = "";
					}
				});
			}

			function updateSetInfo(set) {
				const setInfoDiv = document.getElementById("setInfo");
				const profile = getPackProfile(set);
				const badgeClass = `pack-type-${profile.format === "pre-foil" ? "draft" : profile.format}`;

				let infoHtml = `<span style="font-family: monospace; background: #3a3a3a; padding: 2px 6px; border-radius: 3px; margin-right: 8px;">${set.code}</span>${set.card_count} cards • Released: ${set.released_at}`;
				infoHtml += `<span class="pack-type-badge ${badgeClass}">${profile.label}</span>`;

				if (set.icon_svg_uri) {
					infoHtml =
						`<img src="${set.icon_svg_uri}" alt="${set.name} icon" style="width: 20px; height: 20px; margin-right: 8px; vertical-align: middle; filter: drop-shadow(0px 0px 0px rgba(0,0,0,0.5));">` +
						infoHtml;
				}

				setInfoDiv.innerHTML = infoHtml;
			}

			async function generatePack() {
				const setCode = document.getElementById("setSelect").value;
				if (!setCode) return;

				await generatePackForSet(setCode);
			}

			async function generateRandomPack() {
				const eligibleSets = allSets.filter((set) => set.card_count > 50);
				const randomSet =
					eligibleSets[Math.floor(Math.random() * eligibleSets.length)];

				document.getElementById("setSelect").value = randomSet.code;
				updateSetInfo(randomSet);

				await generatePackForSet(randomSet.code);
			}

			async function generatePackForSet(setCode) {
				// Cancel any ongoing generation
				if (currentGeneration) {
					currentGeneration.cancelled = true;
				}

				const selectedSet = allSets.find((s) => s.code === setCode);
				const profile = getPackProfile(selectedSet);

				// Determine whether this pack will contain a foil
				const hasFoil =
					profile.foilGuaranteed ||
					(profile.foilRate > 0 && Math.random() < profile.foilRate);

				// For draft era, the foil replaces a common — pack stays 15 cards.
				// For play/masters, the foil is a dedicated extra slot.
				packSize = profile.packSize;

				currentGeneration = {
					cancelled: false,
					cardCount: 0,
					profile,
					hasFoil,
				};

				showLoading(true);
				hideError();
				setupPackGrid(profile, hasFoil);

				try {
					await generatePackProgressive(setCode, currentGeneration);
				} catch (error) {
					if (!currentGeneration.cancelled) {
						showError("Failed to generate pack: " + error.message);
					}
				} finally {
					showLoading(false);
					if (!currentGeneration.cancelled) {
						currentGeneration = null;
					}
				}
			}

			// ── setupPackGrid ──────────────────────────────────────────────────────��──
			// Builds the visual placeholder slots according to pack format.
			function setupPackGrid(profile, hasFoil) {
				document.getElementById("flipAllBtn").style.display = "none";
				document.getElementById("flipAllBtn").textContent = "Flip All";
				const grid = document.getElementById("packGrid");
				grid.innerHTML = "";

				const slots = buildSlotManifest(profile, hasFoil);

				for (let i = 0; i < slots.length; i++) {
					const cardSlot = document.createElement("div");
					cardSlot.className = "card-slot loading";
					cardSlot.id = `card-slot-${i}`;

					const loadingText = document.createElement("div");
					loadingText.className = "loading-text";
					loadingText.textContent = slots[i].label;

					cardSlot.appendChild(loadingText);
					grid.appendChild(cardSlot);
				}
			}

			// ── buildSlotManifest ─────────────────────────────────────────────────────
			/**
			 * Returns an array of slot descriptors that fully describes the pack.
			 * Each slot: { type, label, rarity, isFoil }
			 *
			 * Draft booster (with foil):     9C + foil + 3U + 1R + 1Land  = 15
			 * Draft booster (no foil):      10C       + 3U + 1R + 1Land  = 15
			 * Masters booster:              10C       + 3U + 1R + 1foil  = 15  (foil dedicated)
			 * Play booster:                  6C + 3U + 1R + 1wild + 1list + 1foil + 1land = 14
			 * Pre-foil:                     10C       + 3U + 1R + 1Land  = 15
			 */
			function buildSlotManifest(profile, hasFoil) {
				const slots = [];

				if (profile.format === "play") {
					// Play Booster — fixed 14-slot structure
					// 6 commons
					for (let i = 0; i < 6; i++)
						slots.push({
							type: "common",
							label: "Common",
							rarity: "common",
							isFoil: false,
						});
					// 3 uncommons
					for (let i = 0; i < 3; i++)
						slots.push({
							type: "uncommon",
							label: "Uncommon",
							rarity: "uncommon",
							isFoil: false,
						});
					// 1 guaranteed rare/mythic
					slots.push({
						type: "rare",
						label: "Rare",
						rarity: "rare",
						isFoil: false,
					});
					// 1 wildcard (any rarity)
					slots.push({
						type: "wildcard",
						label: "🃏 Wild",
						rarity: rollWildcardRarity(),
						isFoil: false,
					});
					// 1 list / C-U slot (12.5% list, 87.5% common/uncommon)
					// We always draw from common here; the caller handles the list chance
					slots.push({
						type: "list",
						label: "📋 List",
						rarity: "common",
						isFoil: false,
						mayBeList: true,
					});
					// 1 guaranteed foil (any rarity)
					slots.push({
						type: "foil",
						label: "✨ Foil",
						rarity: rollFoilRarity(),
						isFoil: true,
					});
					// 1 basic land
					slots.push({
						type: "land",
						label: "Land",
						rarity: "land",
						isFoil: false,
					});
				} else if (profile.format === "masters") {
					// Masters — 10 commons, 3 uncommons, 1 rare, 1 foil (dedicated last slot)
					for (let i = 0; i < 10; i++)
						slots.push({
							type: "common",
							label: "Common",
							rarity: "common",
							isFoil: false,
						});
					for (let i = 0; i < 3; i++)
						slots.push({
							type: "uncommon",
							label: "Uncommon",
							rarity: "uncommon",
							isFoil: false,
						});
					slots.push({
						type: "rare",
						label: "Rare",
						rarity: "rare",
						isFoil: false,
					});
					slots.push({
						type: "foil",
						label: "✨ Foil",
						rarity: rollFoilRarity(),
						isFoil: true,
					});
				} else {
					// Draft / Pre-foil — 10 commons (or 9+foil), 3 uncommons, 1 rare, 1 land
					if (hasFoil && profile.foilReplacesCommon) {
						// Foil replaces the 10th common — 9 regular commons + 1 foil slot
						for (let i = 0; i < 9; i++)
							slots.push({
								type: "common",
								label: "Common",
								rarity: "common",
								isFoil: false,
							});
						slots.push({
							type: "foil",
							label: "✨ Foil",
							rarity: rollFoilRarity(),
							isFoil: true,
						});
					} else {
						// No foil: 10 standard commons
						for (let i = 0; i < 10; i++)
							slots.push({
								type: "common",
								label: "Common",
								rarity: "common",
								isFoil: false,
							});
					}
					for (let i = 0; i < 3; i++)
						slots.push({
							type: "uncommon",
							label: "Uncommon",
							rarity: "uncommon",
							isFoil: false,
						});
					slots.push({
						type: "rare",
						label: "Rare",
						rarity: "rare",
						isFoil: false,
					});
					slots.push({
						type: "land",
						label: "Land",
						rarity: "land",
						isFoil: false,
					});
				}

				return slots;
			}

			// ── generatePackProgressive ──────────���────────────────────────────────────
			async function generatePackProgressive(setCode, generation) {
				updateProgress("Starting pack generation...");

				const usedCardIds = new Set();
				const { profile, hasFoil } = generation;
				const slots = buildSlotManifest(profile, hasFoil);
				// Keep packSize in sync with actual slot count
				packSize = slots.length;

				for (let i = 0; i < slots.length; i++) {
					if (generation.cancelled) return;

					const slot = slots[i];
					updateProgress(
						`Fetching slot ${i + 1}/${slots.length} (${slot.label})...`,
					);

					try {
						// Determine what rarity to request from the API
						let apiRarity = slot.rarity;

						// List slot: 12.5% chance to fetch from The List (plist),
						// otherwise treat as a common/uncommon from the set.
						if (slot.mayBeList && Math.random() < 0.125) {
							// Fetch from plist set — fall back to common on error
							try {
								const card = await fetchSingleCard("plist", "any", usedCardIds);
								if (!generation.cancelled && card) {
									displayCard(card, i, false, "list");
									usedCardIds.add(card.id);
									generation.cardCount++;
								}
								continue;
							} catch (listErr) {
								console.log(
									"[booster] plist fetch failed, falling back to common:",
									listErr.message,
								);
								apiRarity = "common";
							}
						}

						const card = await fetchSingleCard(setCode, apiRarity, usedCardIds);

						if (!generation.cancelled && card) {
							displayCard(
								card,
								i,
								slot.isFoil,
								slot.type === "land"
									? "land"
									: slot.type === "list"
										? "list"
										: null,
							);
							usedCardIds.add(card.id);
							generation.cardCount++;
						}
					} catch (error) {
						// Land slot with no lands — replace with extra common
						if (slot.type === "land") {
							console.log(
								"No common lands in this set, replacing land slot with common",
							);
							try {
								const card = await fetchSingleCard(
									setCode,
									"common",
									usedCardIds,
								);
								if (!generation.cancelled && card) {
									displayCard(card, i);
									usedCardIds.add(card.id);
									generation.cardCount++;
								}
							} catch (fallbackError) {
								console.error(
									"Failed to fetch fallback common for land slot:",
									fallbackError,
								);
							}
						} else {
							console.error(
								`Failed to fetch slot ${i} (${slot.label}):`,
								error,
							);
						}
					}
				}

				if (!generation.cancelled) {
					updateProgress(
						`Pack complete! ${generation.cardCount}/${packSize} cards loaded.`,
					);
					document.getElementById("flipAllBtn").style.display = "";
					setTimeout(() => {
						document.getElementById("progress").style.display = "none";
					}, 2000);
				}
			}

			async function fetchSingleCard(setCode, rarity, usedCardIds = new Set()) {
				let attempts = 0;
				const maxAttempts = 20;

				while (attempts < maxAttempts) {
					attempts++;

					const response = await fetch("/api/booster/single", {
						method: "POST",
						headers: { "Content-Type": "application/json" },
						body: JSON.stringify({
							set_code: setCode,
							rarity: rarity,
							exclude_ids: Array.from(usedCardIds),
						}),
					});

					// 404 means none of this type exist in the set — no point retrying
					if (response.status === 404) {
						const data = await response.json();
						throw new Error(data.error || `No ${rarity} cards available`);
					}

					const data = await response.json();

					if (data.error) {
						throw new Error(data.error);
					}

					const card = data.card;

					// If it's a common slot and we got a land, re-roll
					if (rarity === "common" && card.is_common_land) {
						console.log(
							`Re-rolling common land: ${card.name} (attempt ${attempts})`,
						);
						usedCardIds.add(card.id);
						continue;
					}

					return card;
				}

				throw new Error(
					`Failed to get non-basic ${rarity} card after ${maxAttempts} attempts`,
				);
			}

			function displayCard(card, slotIndex, isFoil = false, slotType = null) {
				const cardSlot = document.getElementById(`card-slot-${slotIndex}`);
				if (!cardSlot) return;

				cardSlot.innerHTML = "";
				cardSlot.className = "card-slot";

				const faces = [card.image_url, card.back_image_url || "/cardback.jpg"];
				const isDFC = !!card.back_image_url;

				const img = document.createElement("img");
				img.src = "/cardback.jpg";
				img.alt = "Card back";
				img.title = "Click to reveal";

				const rarityBadge = document.createElement("div");
				let badgeClass, badgeText;
				if (isFoil) {
					badgeClass = card.rarity;
					badgeText = "✨";
				} else if (slotType === "land") {
					badgeClass = "land";
					badgeText = "L";
				} else if (slotType === "list") {
					badgeClass = "list";
					badgeText = "📋";
				} else {
					badgeClass = card.rarity;
					badgeText = card.rarity[0].toUpperCase();
				}
				rarityBadge.className = `card-rarity rarity-${badgeClass}`;
				rarityBadge.textContent = badgeText;
				rarityBadge.style.display = "none";

				const sendOverlay = document.createElement("div");
				sendOverlay.className = "send-overlay";
				[1, 2, 3, 4].forEach((p) => {
					const btn = document.createElement("button");
					btn.textContent = `P${p}`;
					btn.title = `Send to Player ${p}`;
					btn.addEventListener("click", async (e) => {
						e.stopPropagation();
						btn.disabled = true;
						btn.textContent = "...";
						try {
							const r = await fetch(`/api/send/${p}`, {
								method: "POST",
								headers: { "Content-Type": "application/json" },
								body: JSON.stringify({
									q: card.name,
									premium: isFoil ? "foil" : null,
								}),
							});
							btn.textContent = r.ok ? "✓" : "✗";
							if (r.ok) showSendQr(p);
						} catch {
							btn.textContent = "✗";
						}
						setTimeout(() => {
							btn.textContent = `P${p}`;
							btn.disabled = false;
						}, 1500);
					});
					sendOverlay.appendChild(btn);
				});

				cardSlot.appendChild(img);
				cardSlot.appendChild(rarityBadge);
				cardSlot.appendChild(sendOverlay);

				let faceIndex = -1;
				cardSlot.dataset.faceIndex = "-1";

				img.onload = () => {
					img.classList.add("loaded");
				};

				function flipTo(nextIndex) {
					const nextSrc = nextIndex === -1 ? "/cardback.jpg" : faces[nextIndex];

					animatedCardFlip(img, nextSrc, () => {
						if (nextIndex === -1) {
							img.alt = "Card back";
							img.title = "Click to reveal";
							rarityBadge.style.display = "none";
							cardSlot.classList.remove("foil", "revealed");
						} else if (nextIndex === 0) {
							img.alt = card.name;
							img.title = isDFC
								? `${card.name} - click to see back face`
								: `${card.name} - ${card.rarity}${isFoil ? " ✨" : ""}`;
							rarityBadge.style.display = "";
							if (isFoil) cardSlot.classList.add("foil");
							cardSlot.classList.add("revealed");
						} else {
							img.alt = `${card.name} (back face)`;
							img.title = `${card.name} - click to flip`;
							rarityBadge.style.display = "";
							if (isFoil) cardSlot.classList.add("foil");
							cardSlot.classList.add("revealed");
						}
						faceIndex = nextIndex;
						cardSlot.dataset.faceIndex = String(nextIndex);
					});
				}

				let expandTimeout = null;

				cardSlot.addEventListener("pointerenter", (e) => {
					if (e.pointerType === "mouse") {
						cardSlot.classList.add("expanded");
					}
				});

				cardSlot.addEventListener("pointerleave", (e) => {
					if (e.pointerType === "mouse") {
						cardSlot.classList.remove("expanded");
					}
				});

				cardSlot.addEventListener("pointerdown", (e) => {
					if (e.pointerType !== "mouse") {
						const wasExpanded = cardSlot.classList.contains("expanded");
						document.querySelectorAll(".card-slot.expanded").forEach((el) => {
							el.classList.remove("expanded");
						});
						if (!wasExpanded) {
							cardSlot.classList.add("expanded");
							e.stopPropagation();
						}
					}
				});
				cardSlot.addEventListener("click", () => {
					if (
						img.classList.contains("flipping-out") ||
						img.classList.contains("flipping-in")
					)
						return;

					if (faceIndex === -1) {
						flipTo(0);
					} else if (isDFC) {
						flipTo(faceIndex === 0 ? 1 : 0);
					} else {
						flipTo(faceIndex === 0 ? -1 : 0);
					}
				});
			}

			document.addEventListener("pointerdown", (e) => {
				if (!e.target.closest(".card-slot")) {
					document.querySelectorAll(".card-slot.expanded").forEach((el) => {
						el.classList.remove("expanded");
					});
				}
			});

				// const progressDiv = document.getElementById('progress');
				// progressDiv.textContent = message;
				// progressDiv.style.display = 'block';
			}

			function showLoading(show) {
				document.getElementById("loading").style.display = show
					? "block"
					: "none";
				document.getElementById("generateBtn").disabled = show;
				document.getElementById("randomBtn").disabled = show;
			}

			function showError(message) {
				const errorDiv = document.getElementById("error");
				errorDiv.textContent = message;
				errorDiv.style.display = "block";
			}

			function hideError() {
				document.getElementById("error").style.display = "none";
			}

			// Load sets when page loads
			loadSets();
		</script>
