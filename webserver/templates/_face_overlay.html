<div class="cardOverlay">
	<div class="counterBar">
		<div
			id="minusBtn"
			class="btn pm"
			role="button"
			tabindex="0"
			aria-label="Decrement"
		>
			−
		</div>
		<div class="counterCenter">
			<div id="countBtn" class="btn smallText" hidden aria-hidden="true"></div>
		</div>
		<div
			id="plusBtn"
			class="btn pm"
			role="button"
			tabindex="0"
			aria-label="Increment"
		>
			+
		</div>
	</div>
</div>
