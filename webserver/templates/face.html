<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Face</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --bg: #000;
        --punch-x: 0.03; /* crop % from left AND right */
        --punch-y: 0.03;
      }

      html, body {
        height: 100%;
        margin: 0;
        background: var(--bg);
        overflow: hidden;
      }

      .stage {
        position: fixed;
        inset: 0;
        background: var(--bg);
      }

      /* Card wrap is the transform target (rotate affects image + its overlays together) */
      #cardWrap {
        position: absolute;
        top: 0;
        left: 0;

        /* Set dynamically to the fitted card size */
        width: 100vw;
        height: 100vh;

        transform-origin: top left;
        transform: none;

        overflow: hidden; /* required for punch-in crop */
      }

      html.rotate #cardWrap {
        transform: rotate(90deg) translateY(-100%);
      }

      #card {
        position: absolute;
        inset: 0;

        width: 100%;
        height: 100%;
        object-fit: fill; /* wrap is sized to preserve aspect */
        display: block;

        transform-origin: center center;
        transform: scale(
          calc(1 + (2 * var(--punch-x))),
          calc(1 + (2 * var(--punch-y)))
        );
      }

      /* Click-capture layer above image (rotates with cardWrap) */
      #clickCatcher {
        position: absolute;
        inset: 0;
        z-index: 2;
        cursor: pointer;
        pointer-events: auto;
        background: transparent;
      }

      /* Rotated overlay layer (counters/arrows/etc). This rotates with cardWrap. */
      .cardOverlay {
        position: absolute;
        inset: 0;
        z-index: 5;
        pointer-events: none; /* overlay itself doesn't block; individual controls enable */
      }

      /* Shared pill button style */
      .btn {
        height: 64px;
        min-width: 64px;
        padding: 0 18px;

        display: inline-grid;
        place-items: center;

        color: rgba(255,255,255,0.92);
        background: rgba(0,0,0,0.35);
        border: 1px solid rgba(255,255,255,0.18);
        border-radius: 999px;

        font: 44px/1 sans-serif;
        user-select: none;

        pointer-events: auto; /* clickable */
      }

      .btn.smallText {
        font-size: 28px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      /* Plus/minus a bit smaller (~25%) */
      .btn.pm {
        height: 48px;
        min-width: 48px;
        padding: 0 14px;
        font-size: 32px;
      }

      /* Hard force: if hidden attribute is present, it must not render */
      #countBtn[hidden] { display: none !important; }

      /* Counter cluster anchored to card edges, 1/3 down the CARD (not viewport) */
      .counterBar {
        position: absolute;
        top: 33.333%;
        left: 0;     /* flush to card edge */
        right: 0;    /* flush to card edge */
        transform: translateY(-50%);

        display: flex;
        align-items: center;
        justify-content: space-between;

        padding: 0;
      }

      .counterCenter {
        flex: 1;
        display: flex;
        justify-content: center;
        padding: 0 12px;
      }

      /* Screen overlay (NOT rotated): QR lives here */
      .screenOverlay {
        position: absolute;
        inset: 0;
        z-index: 20;
        pointer-events: none;
      }

      .qr {
        position: absolute;
        top: 12px;
        left: 12px;
        background: rgba(0,0,0,0.55);
        border: 1px solid rgba(255,255,255,0.25);
        padding: 10px;
        border-radius: 8px;
        backdrop-filter: blur(2px);
      }

      .qr canvas {
        width: 140px;
        height: 140px;
        image-rendering: pixelated;
        display: block;
        background: #fff;
      }

      .qr .label {
        margin-top: 8px;
        color: #fff;
        font: 12px/1.2 sans-serif;
        max-width: 160px;
        word-break: break-word;
        opacity: 0.95;
      }
    </style>
  </head>

  <body>
    <div class="stage">
      <div id="cardWrap">
        <img id="card" alt="" />
        <div id="clickCatcher" title="Tap to flip"></div>

        <!-- This overlay rotates with the card -->
        <div class="cardOverlay">
          <div class="counterBar">
            <div id="minusBtn" class="btn pm" role="button" tabindex="0" aria-label="Decrement">−</div>

            <div class="counterCenter">
              <div id="countBtn" class="btn smallText" hidden aria-hidden="true"></div>
            </div>

            <div id="plusBtn" class="btn pm" role="button" tabindex="0" aria-label="Increment">+</div>
          </div>
        </div>
      </div>

      <!-- This overlay does NOT rotate -->
      <div class="screenOverlay">
        <div id="qrWrap" class="qr" hidden>
          <canvas id="qr" width="140" height="140"></canvas>
          <div id="qrLabel" class="label"></div>
        </div>
      </div>
    </div>

    <script>
      const CARD_BACK_URL = "https://files.mtg.wiki/Magic_card_back.jpg";

      function getRotateOverride() {
        const p = new URLSearchParams(window.location.search);
        if (!p.has("rotate")) return false;

        const v = (p.get("rotate") || "").trim().toLowerCase();
        return ["1", "true", "yes", "on"].includes(v);
      }

      const rotate = getRotateOverride();
      if (rotate) document.documentElement.classList.add("rotate");

      const cardWrap = document.getElementById("cardWrap");
      const img = document.getElementById("card");
      const clickCatcher = document.getElementById("clickCatcher");

      function fitCardWrapToViewport(naturalW, naturalH) {
        if (!naturalW || !naturalH) return;

        const vw = window.innerWidth;
        const vh = window.innerHeight;

        const availW = rotate ? vh : vw;
        const availH = rotate ? vw : vh;

        const scale = Math.min(availW / naturalW, availH / naturalH);
        const w = Math.floor(naturalW * scale);
        const h = Math.floor(naturalH * scale);

        cardWrap.style.width = w + "px";
        cardWrap.style.height = h + "px";
      }

      // --- face/flip state ---
      let lastCardId = null;

      let isTwoSided = false;
      let faceIndex = 0; // 0 or 1 for two-sided
      let showBackForOneSided = false;

      let oneSidedFrontUrl = null;
      let twoSidedFaceUrls = [null, null];

      function cacheBust(url) {
        if (!url) return url;
        try {
          const u = new URL(url);
          u.searchParams.set("_t", Date.now().toString());
          return u.toString();
        } catch {
          const joiner = url.includes("?") ? "&" : "?";
          return url + joiner + "_t=" + Date.now().toString();
        }
      }

      function setImageUrl(url) {
        img.src = cacheBust(url);
      }

      function computeDisplayUrl() {
        if (isTwoSided) {
          return twoSidedFaceUrls[faceIndex] || twoSidedFaceUrls[0] || oneSidedFrontUrl;
        }
        return showBackForOneSided ? CARD_BACK_URL : oneSidedFrontUrl;
      }

      function renderFace() {
        const url = computeDisplayUrl();
        if (url) setImageUrl(url);
      }

      function resetFaceStateForNewCard(cardId, twoSided) {
        if (cardId && cardId !== lastCardId) {
          lastCardId = cardId;
          isTwoSided = twoSided;
          faceIndex = 0;
          showBackForOneSided = false;
          return;
        }

        // No id or same id: if twoSided-ness changes, reset.
        if (twoSided !== isTwoSided) {
          isTwoSided = twoSided;
          faceIndex = 0;
          showBackForOneSided = false;
        }
      }

      clickCatcher.addEventListener("click", () => {
        if (isTwoSided) {
          faceIndex = faceIndex === 0 ? 1 : 0;
        } else {
          showBackForOneSided = !showBackForOneSided;
        }
        renderFace();
      });

      // --- Counter UI ---
      let counter = 0;

      const minusBtn = document.getElementById("minusBtn");
      const plusBtn = document.getElementById("plusBtn");
      const countBtn = document.getElementById("countBtn");

      function renderCounter() {
        if (counter === 0) {
          countBtn.hidden = true;
          countBtn.setAttribute("aria-hidden", "true");
          countBtn.textContent = "";
          return;
        }

        countBtn.hidden = false;
        countBtn.setAttribute("aria-hidden", "false");

        if (counter > 0) {
          countBtn.textContent = `+${counter}/+${counter}`;
        } else {
          countBtn.textContent = `${counter}/${counter}`;
        }
      }

      function dec() { counter -= 1; renderCounter(); }
      function inc() { counter += 1; renderCounter(); }

      function wireButton(el, fn) {
        el.addEventListener("click", fn);
        el.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            fn();
          }
        });
      }

      wireButton(minusBtn, dec);
      wireButton(plusBtn, inc);
      renderCounter();

      // --- QR code (only shown when there is NO image url) ---
      async function loadQrLib() {
        const src = "https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js";
        await new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = src;
          s.onload = resolve;
          s.onerror = () => reject(new Error("Failed to load QR library"));
          document.head.appendChild(s);
        });
      }

      function drawQrToCanvas(text, canvas) {
        const qr = window.qrcode(0, "M");
        qr.addData(text);
        qr.make();

        const ctx = canvas.getContext("2d");
        const count = qr.getModuleCount();
        const size = canvas.width;
        const scale = Math.floor(size / count);
        const offset = Math.floor((size - count * scale) / 2);

        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, size, size);

        ctx.fillStyle = "#000";
        for (let r = 0; r < count; r++) {
          for (let c = 0; c < count; c++) {
            if (qr.isDark(r, c)) {
              ctx.fillRect(offset + c * scale, offset + r * scale, scale, scale);
            }
          }
        }
      }

      async function showQr() {
        const wrap = document.getElementById("qrWrap");
        const canvas = document.getElementById("qr");
        const label = document.getElementById("qrLabel");

        const baseHost = "raspberrypi.local";
        const url = `${location.protocol}//${baseHost}${location.port ? ":" + location.port : ""}/config`;
        label.textContent = url;

        try {
          await loadQrLib();
          drawQrToCanvas(url, canvas);
          canvas.style.display = "block";
        } catch (e) {
          canvas.style.display = "none";
        }

        wrap.hidden = false;
      }

      function hideQr() {
        document.getElementById("qrWrap").hidden = true;
      }

      // --- image polling ---
      let lastUrl = null;

      function getScryfallImageInfo(data) {
        // Two-sided (transform/MDFC/etc)
        if (data && Array.isArray(data.card_faces) && data.card_faces.length >= 2) {
          const a = data.card_faces[0] && data.card_faces[0].image_uris;
          const b = data.card_faces[1] && data.card_faces[1].image_uris;

          const u0 = a && (a.border_crop || a.normal || a.large || a.png || a.art_crop);
          const u1 = b && (b.border_crop || b.normal || b.large || b.png || b.art_crop);

          // Treat as two-sided even if only one exists; but require at least face0 to render.
          if (u0) {
            return { twoSided: true, id: data.id || null, face0: u0, face1: u1 || u0 };
          }
        }

        // One-sided
        const iu = data && data.image_uris;
        const u = iu && (iu.art_crop || iu.border_crop || iu.normal || iu.large || iu.png);
        if (u) {
          return { twoSided: false, id: data.id || null, front: u };
        }

        // Fallback for older server payloads that only provided border_crop_url
        if (data && data.border_crop_url) {
          return { twoSided: false, id: data.id || null, front: String(data.border_crop_url) };
        }

        return null;
      }

      async function poll() {
        try {
          const r = await fetch("/api/current", { cache: "no-store" });
          const data = await r.json();

          const info = getScryfallImageInfo(data);

          if (!info) {
            if (lastUrl !== "") {
              lastUrl = "";
              img.removeAttribute("src");
            }
            showQr();
            return;
          }

          hideQr();

          if (info.twoSided) {
            resetFaceStateForNewCard(info.id, true);
            twoSidedFaceUrls = [info.face0, info.face1];
            oneSidedFrontUrl = info.face0;
          } else {
            resetFaceStateForNewCard(info.id, false);
            oneSidedFrontUrl = info.front;
            twoSidedFaceUrls = [null, null];
          }

          const displayUrl = computeDisplayUrl();
          if (displayUrl && displayUrl !== lastUrl) {
            lastUrl = displayUrl;
            renderFace();
          }
        } catch (e) {
          // keep last state
        }
      }

      img.addEventListener("load", () => {
        fitCardWrapToViewport(img.naturalWidth, img.naturalHeight);
      });

      window.addEventListener("resize", () => {
        fitCardWrapToViewport(img.naturalWidth, img.naturalHeight);
      });

      poll();
      setInterval(poll, 1000);
    </script>
  </body>
</html>
