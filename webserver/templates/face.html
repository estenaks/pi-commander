<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Face</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root { --bg: #000; }

      html, body {
        height: 100%;
        margin: 0;
        background: var(--bg);
        overflow: hidden;
      }

      .stage {
        position: fixed;
        inset: 0;
        background: var(--bg);
      }

      /* Layers for overlays (counters/text/QR/etc) */
      .layer {
        position: absolute;
        inset: 0;
      }

      /* Card image base behavior: top-left anchored, fit without cropping */
      #card {
        position: absolute;
        top: 0;
        left: 0;

        max-width: 100vw;
        max-height: 100vh;
        width: auto;
        height: auto;

        object-fit: contain;
        display: block;

        transform-origin: top left;
        transform: none; /* default: no rotation */
      }

      /* Manual rotation */
      html.rotate #card {
        transform: rotate(90deg) translateY(-100%);
        max-width: 100vh;
        max-height: 100vw;
      }

      .overlay {
        pointer-events: none;
        z-index: 10;
      }

      /* QR badge (TOP-LEFT) */
      .qr {
        position: absolute;
        top: 12px;
        left: 12px;
        background: rgba(0,0,0,0.55);
        border: 1px solid rgba(255,255,255,0.25);
        padding: 10px;
        border-radius: 8px;
        backdrop-filter: blur(2px);
      }

      .qr canvas {
        width: 140px;
        height: 140px;
        image-rendering: pixelated;
        display: block;
        background: #fff;
      }

      .qr .label {
        margin-top: 8px;
        color: #fff;
        font: 12px/1.2 sans-serif;
        max-width: 160px;
        word-break: break-word;
        opacity: 0.95;
      }

      /* Navigation arrows (overlay, 1/3 down the viewport) */
      .nav {
        position: absolute;
        top: 33.333vh;           /* one third down the screen */
        transform: translateY(-50%);
        width: 64px;
        height: 64px;

        display: grid;
        place-items: center;

        color: rgba(255,255,255,0.85);
        background: rgba(0,0,0,0.35);
        border: 1px solid rgba(255,255,255,0.18);
        border-radius: 999px;

        font: 44px/1 sans-serif;
        user-select: none;
      }

      .nav-left { left: 12px; }
      .nav-right { right: 12px; }
    </style>
  </head>

  <body>
    <div class="stage">
      <div class="layer card-layer">
        <img id="card" alt="" />
      </div>

      <div class="layer overlay">
        <div id="qrWrap" class="qr" hidden>
          <canvas id="qr" width="140" height="140"></canvas>
          <div id="qrLabel" class="label"></div>
        </div>

        <!-- One third down the screen, anchored to edges -->
        <div class="nav nav-left" aria-hidden="true">‹</div>
        <div class="nav nav-right" aria-hidden="true">›</div>
      </div>
    </div>

    <script>
      function getRotateOverride() {
        const p = new URLSearchParams(window.location.search);
        if (!p.has("rotate")) return null;

        const v = (p.get("rotate") || "").trim().toLowerCase();
        if (["1", "true", "yes", "on"].includes(v)) return true;
        if (["0", "false", "no", "off"].includes(v)) return false;

        return null;
      }

      // Manual-only: default is NO rotation unless rotate=1 (etc) is provided
      const override = getRotateOverride();
      if (override === true) {
        document.documentElement.classList.add("rotate");
      }

      // --- QR code (only shown when there is NO image url) ---
      async function loadQrLib() {
        const src = "https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js";
        await new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = src;
          s.onload = resolve;
          s.onerror = () => reject(new Error("Failed to load QR library"));
          document.head.appendChild(s);
        });
      }

      function drawQrToCanvas(text, canvas) {
        const qr = window.qrcode(0, "M");
        qr.addData(text);
        qr.make();

        const ctx = canvas.getContext("2d");
        const count = qr.getModuleCount();
        const size = canvas.width;
        const scale = Math.floor(size / count);
        const offset = Math.floor((size - count * scale) / 2);

        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, size, size);

        ctx.fillStyle = "#000";
        for (let r = 0; r < count; r++) {
          for (let c = 0; c < count; c++) {
            if (qr.isDark(r, c)) {
              ctx.fillRect(offset + c * scale, offset + r * scale, scale, scale);
            }
          }
        }
      }

      async function showQr() {
        const wrap = document.getElementById("qrWrap");
        const canvas = document.getElementById("qr");
        const label = document.getElementById("qrLabel");

        const baseHost = "raspberrypi.local";
        const url = `${location.protocol}//${baseHost}${location.port ? ":" + location.port : ""}/config`;

        label.textContent = url;

        try {
          await loadQrLib();
          drawQrToCanvas(url, canvas);
          canvas.style.display = "block";
        } catch (e) {
          canvas.style.display = "none";
        }

        wrap.hidden = false;
      }

      function hideQr() {
        document.getElementById("qrWrap").hidden = true;
      }

      // --- image polling ---
      const img = document.getElementById("card");
      let lastUrl = null;

      async function poll() {
        try {
          const r = await fetch("/api/current", { cache: "no-store" });
          const data = await r.json();

          const url = (data && data.border_crop_url) ? String(data.border_crop_url) : "";

          if (!url) {
            if (lastUrl !== "") {
              lastUrl = "";
              img.removeAttribute("src");
            }
            showQr();
            return;
          }

          hideQr();

          if (url !== lastUrl) {
            lastUrl = url;

            const u = new URL(url);
            u.searchParams.set("_t", Date.now().toString());
            img.src = u.toString();
          }
        } catch (e) {
          // keep last state
        }
      }

      poll();
      setInterval(poll, 1000);
    </script>
  </body>
</html>
