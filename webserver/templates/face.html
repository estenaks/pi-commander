<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Face</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        --bg: #000;

        /* keep punch vars around (disabled) */
        --punch-x: 0;
        --punch-y: 0;

        /* crop bottom 3% (in the image's own orientation) */
        --crop-bottom: 0.03;
      }

      html, body {
        height: 100%;
        margin: 0;
        background: var(--bg);
        overflow: hidden;
      }

      .stage {
        position: fixed;
        inset: 0;
        background: var(--bg);
      }

      /*
        #rotator rotates the entire "content plane" (image + UI overlay) when rotate=1.
        Inside it, #viewport defines the unrotated layout plane we size/position things in.
      */
      #rotator {
        position: absolute;
        inset: 0;
        transform-origin: top left;
        transform: none;
      }

      html.rotate #rotator {
        transform: rotate(90deg) translateY(-100%);
      }

      #viewport {
        position: absolute;
        top: 0;
        left: 0;
        overflow: hidden;
      }

      /* The "layout plane" dimensions */
      html:not(.rotate) #viewport {
        width: 100vw;
        height: 100vh;
      }

      /* When rotated, the layout plane is swapped (we lay out in a vh x vw plane) */
      html.rotate #viewport {
        width: 100vh;
        height: 100vw;
      }

      /* Media container: height-fitted and horizontally centered within #viewport */
      #mediaWrap {
        position: absolute;
        top: 0;
        left: 0; /* JS sets */
        overflow: hidden; /* crops bottom + side overflow equally */
      }

      /* Image: scaled in Y so bottom 3% is cropped off */
      #card {
        position: absolute;
        top: 0;
        left: 0;

        width: 100%;
        height: calc(100% / (1 - var(--crop-bottom)));
        object-fit: fill;
        display: block;

        transform-origin: center center;
        transform: scale(
          calc(1 + (2 * var(--punch-x))),
          calc(1 + (2 * var(--punch-y)))
        );
      }

      /* UI overlay is viewport-anchored (in the same rotated plane) */
      #ui {
        position: absolute;
        inset: 0;
        z-index: 10;
        pointer-events: none;
      }

      .btn {
        height: 64px;
        min-width: 64px;
        padding: 0 18px;

        display: inline-grid;
        place-items: center;

        color: rgba(255,255,255,0.92);
        background: rgba(0,0,0,0.35);
        border: 1px solid rgba(255,255,255,0.18);
        border-radius: 999px;

        font: 44px/1 sans-serif;
        user-select: none;

        pointer-events: auto;
      }

      .btn.smallText {
        font-size: 28px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      .btn.pm {
        height: 48px;
        min-width: 48px;
        padding: 0 14px;
        font-size: 32px;
      }

      #countBtn[hidden] { display: none !important; }

      /* Counter cluster anchored to the layout plane edges */
      .counterBar {
        position: absolute;
        top: 33.333%;
        left: 0;
        right: 0;
        transform: translateY(-50%);

        display: flex;
        align-items: center;
        justify-content: space-between;

        padding: 0;
      }

      .counterCenter {
        flex: 1;
        display: flex;
        justify-content: center;
        padding: 0 12px;
      }

      .qr {
        position: absolute;
        top: 12px;
        left: 12px;
        background: rgba(0,0,0,0.55);
        border: 1px solid rgba(255,255,255,0.25);
        padding: 10px;
        border-radius: 8px;
        backdrop-filter: blur(2px);
      }

      .qr canvas {
        width: 140px;
        height: 140px;
        image-rendering: pixelated;
        display: block;
        background: #fff;
      }

      .qr .label {
        margin-top: 8px;
        color: #fff;
        font: 12px/1.2 sans-serif;
        max-width: 160px;
        word-break: break-word;
        opacity: 0.95;
      }
    </style>
  </head>

  <body>
    <div class="stage">
      <div id="rotator">
        <div id="viewport">
          <div id="mediaWrap">
            <img id="card" alt="" />
          </div>

          <div id="ui">
            <div class="counterBar">
              <div id="minusBtn" class="btn pm" role="button" tabindex="0" aria-label="Decrement">−</div>

              <div class="counterCenter">
                <div id="countBtn" class="btn smallText" hidden aria-hidden="true"></div>
              </div>

              <div id="plusBtn" class="btn pm" role="button" tabindex="0" aria-label="Increment">+</div>
            </div>

            <div id="qrWrap" class="qr" hidden>
              <canvas id="qr" width="140" height="140"></canvas>
              <div id="qrLabel" class="label"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      function getRotateOverride() {
        const p = new URLSearchParams(window.location.search);
        if (!p.has("rotate")) return false;

        const v = (p.get("rotate") || "").trim().toLowerCase();
        return ["1", "true", "yes", "on"].includes(v);
      }

      const rotate = getRotateOverride();
      if (rotate) document.documentElement.classList.add("rotate");

      const viewport = document.getElementById("viewport");
      const mediaWrap = document.getElementById("mediaWrap");
      const img = document.getElementById("card");

      /*
        We always "fit by height" of the *layout plane* (#viewport).
        That means:
          - rotate=0: layout plane height == window.innerHeight
          - rotate=1: layout plane height == window.innerWidth  (because plane is width:100vh; height:100vw)

        This is the key: in rotate mode, the height we fit to must be the *viewport width*.
      */
      function fitMediaWrap(naturalW, naturalH) {
        if (!naturalW || !naturalH) return;

        const planeW = viewport.clientWidth;
        const planeH = viewport.clientHeight;

        // Fit to plane height, allow horizontal overflow
        const scale = planeH / naturalH;
        const w = Math.ceil(naturalW * scale);
        const h = Math.ceil(naturalH * scale);

        mediaWrap.style.width = w + "px";
        mediaWrap.style.height = h + "px";

        // Center horizontally within the plane so overflow crops equally left/right
        mediaWrap.style.left = Math.floor((planeW - w) / 2) + "px";
        mediaWrap.style.top = "0px";
      }

      // --- Counter UI ---
      let counter = 0;

      const minusBtn = document.getElementById("minusBtn");
      const plusBtn = document.getElementById("plusBtn");
      const countBtn = document.getElementById("countBtn");

      function renderCounter() {
        if (counter === 0) {
          countBtn.hidden = true;
          countBtn.setAttribute("aria-hidden", "true");
          countBtn.textContent = "";
          return;
        }

        countBtn.hidden = false;
        countBtn.setAttribute("aria-hidden", "false");

        if (counter > 0) {
          countBtn.textContent = `+${counter}/+${counter}`;
        } else {
          countBtn.textContent = `${counter}/${counter}`;
        }
      }

      function dec() { counter -= 1; renderCounter(); }
      function inc() { counter += 1; renderCounter(); }

      function wireButton(el, fn) {
        el.addEventListener("click", fn);
        el.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            fn();
          }
        });
      }

      wireButton(minusBtn, dec);
      wireButton(plusBtn, inc);
      renderCounter();

      // --- QR code (only shown when there is NO image url) ---
      async function loadQrLib() {
        const src = "https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js";
        await new Promise((resolve, reject) => {
          const s = document.createElement("script");
          s.src = src;
          s.onload = resolve;
          s.onerror = () => reject(new Error("Failed to load QR library"));
          document.head.appendChild(s);
        });
      }

      function drawQrToCanvas(text, canvas) {
        const qr = window.qrcode(0, "M");
        qr.addData(text);
        qr.make();

        const ctx = canvas.getContext("2d");
        const count = qr.getModuleCount();
        const size = canvas.width;
        const scale = Math.floor(size / count);
        const offset = Math.floor((size - count * scale) / 2);

        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, size, size);

        ctx.fillStyle = "#000";
        for (let r = 0; r < count; r++) {
          for (let c = 0; c < count; c++) {
            if (qr.isDark(r, c)) {
              ctx.fillRect(offset + c * scale, offset + r * scale, scale, scale);
            }
          }
        }
      }

      async function showQr() {
        const wrap = document.getElementById("qrWrap");
        const canvas = document.getElementById("qr");
        const label = document.getElementById("qrLabel");

        const baseHost = "raspberrypi.local";
        const url = `${location.protocol}//${baseHost}${location.port ? ":" + location.port : ""}/config`;
        label.textContent = url;

        try {
          await loadQrLib();
          drawQrToCanvas(url, canvas);
          canvas.style.display = "block";
        } catch (e) {
          canvas.style.display = "none";
        }

        wrap.hidden = false;
      }

      function hideQr() {
        document.getElementById("qrWrap").hidden = true;
      }

      let lastUrl = null;

      async function poll() {
        try {
          const r = await fetch("/api/current", { cache: "no-store" });
          const data = await r.json();

          const url = (data && data.border_crop_url) ? String(data.border_crop_url) : "";

          if (!url) {
            if (lastUrl !== "") {
              lastUrl = "";
              img.removeAttribute("src");
            }
            showQr();
            return;
          }

          hideQr();

          if (url !== lastUrl) {
            lastUrl = url;

            const u = new URL(url);
            u.searchParams.set("_t", Date.now().toString());
            img.src = u.toString();
          }
        } catch (e) {}
      }

      img.addEventListener("load", () => fitMediaWrap(img.naturalWidth, img.naturalHeight));
      window.addEventListener("resize", () => fitMediaWrap(img.naturalWidth, img.naturalHeight));

      poll();
      setInterval(poll, 1000);
    </script>
  </body>
</html>
